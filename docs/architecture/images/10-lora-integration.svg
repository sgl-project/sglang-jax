<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" width="940" height="480">
<defs>
  <marker id="arr-navy" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1e3a5f"/></marker>
  <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#b45309"/></marker>
</defs>
<rect x="0" y="0" width="940" height="480" fill="#ffffff"/>

<text x="470" y="42" fill="#1e40af" font-size="24" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">LoRA Integration Flow</text>

<!-- LoRARegistry -->
<rect x="370" y="75" width="200" height="55" rx="8" fill="#dbeafe" stroke="#1e3a5f" stroke-width="2"/>
<text x="470" y="98" fill="#1e40af" font-size="14" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">LoRARegistry</text>
<text x="470" y="118" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">RWLock · LoRARef · UUID</text>

<path d="M 470 130 L 470 158" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-navy)"/>

<!-- LoRAManager -->
<rect x="290" y="160" width="360" height="95" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
<text x="470" y="184" fill="#047857" font-size="14" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">LoRAManager</text>
<text x="470" y="207" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">init_adapters → init_shapes → load_weights</text>
<text x="470" y="225" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">→ lora_surgery → init_memory_pool</text>
<text x="470" y="246" fill="#475569" font-size="10" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">Runtime orchestration: load / unload / dispatch</text>

<!-- Branches to MemoryPool and apply_lora_surgery -->
<path d="M 360 255 L 220 290" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-navy)"/>
<path d="M 580 255 L 720 290" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-navy)"/>

<!-- LoRAMemoryPool (left) -->
<rect x="80" y="295" width="280" height="80" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="220" y="318" fill="#b45309" font-size="13" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">LoRAMemoryPool</text>
<text x="220" y="340" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">A_buffer / B_buffer dicts</text>
<text x="220" y="358" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">uid_to_buffer_id slots</text>

<!-- apply_lora_surgery (right) -->
<rect x="580" y="295" width="280" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="720" y="318" fill="#7c3aed" font-size="13" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">apply_lora_surgery</text>
<text x="720" y="340" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">LinearBase → LoRALinear</text>
<text x="720" y="358" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">NNX Module Traversal</text>

<!-- Both sides converge to LoRALinear Forward -->
<path d="M 220 375 L 220 430 L 278 430" fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr-amber)"/>
<rect x="135" y="392" width="110" height="20" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
<text x="190" y="406" fill="#b45309" font-size="10" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">set_lora_info</text>

<path d="M 720 375 L 720 430 L 662 430" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-navy)"/>

<!-- LoRALinear Forward -->
<rect x="280" y="400" width="380" height="60" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
<text x="470" y="423" fill="#be185d" font-size="14" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">LoRALinear Forward</text>
<text x="470" y="445" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">base_output + BGMV(lora_a) → BGMV(lora_b)</text>

<!-- Cache isolation footnote -->
<rect x="40" y="55" width="240" height="22" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="160" y="69" fill="#64748b" font-size="10" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">Cache isolation: lora_id → RadixKey.extra_key</text>
</svg>
