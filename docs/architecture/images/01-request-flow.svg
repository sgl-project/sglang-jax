<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1920" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0e7490"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <style>
      .title    { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-size: 13px; fill: #475569; }
      .modTitle { font-size: 15px; font-weight: 700; fill: #0f172a; }
      .modSub   { font-size: 13px; fill: #1e293b; }
      .modPath  { font-size: 11.5px; fill: #475569; font-family: 'SF Mono', Menlo, Consolas, monospace; }
      .code     { font-size: 13px; fill: #0f172a; font-family: 'SF Mono', Menlo, Consolas, monospace; }
      .codeKey  { font-size: 13px; fill: #b45309; font-family: 'SF Mono', Menlo, Consolas, monospace; font-weight: 700; }
      .edge     { font-size: 12px; fill: #1e293b; font-weight: 600; }
      .note     { font-size: 11.5px; fill: #64748b; font-style: italic; }
      .tag      { font-size: 10.5px; font-weight: 700; fill: #ffffff; }
      .process  { font-size: 11px; fill: #ffffff; font-weight: 600; }
    </style>
  </defs>

  <!-- title -->
  <text x="40" y="40" class="title">SGLang-JAX Request Flow (Text Inference)</text>
  <text x="40" y="62" class="subtitle">Full data flow from HTTP request to response · 3-process architecture (TokenizerManager / Scheduler+ModelWorker / DetokenizerManager)</text>

  <!-- Process labels -->
  <rect x="40" y="90" width="200" height="24" rx="4" fill="#6d28d9"/>
  <text x="140" y="107" class="process" text-anchor="middle">Main Process</text>

  <rect x="260" y="90" width="200" height="24" rx="4" fill="#15803d"/>
  <text x="360" y="107" class="process" text-anchor="middle">Subprocess 1 (Scheduler)</text>

  <rect x="480" y="90" width="200" height="24" rx="4" fill="#0e7490"/>
  <text x="580" y="107" class="process" text-anchor="middle">Subprocess 2 (Detokenizer)</text>

  <!-- ============== STEP 1 HTTP Request ============== -->
  <g>
    <rect x="40" y="140" width="1320" height="100" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
    <rect x="40" y="140" width="1320" height="28" rx="10" fill="#6d28d9"/>
    <text x="56" y="160" class="tag">STEP 1 · HTTP Request Entrypoint</text>
    <text x="56" y="192" class="modTitle">POST /v1/chat/completions</text>
    <text x="56" y="212" class="modPath">python/sgl_jax/srt/entrypoints/http_server.py</text>
    <text x="56" y="230" class="modSub">FastAPI receives request, parses JSON, creates <tspan class="codeKey">ChatCompletionRequest</tspan></text>
  </g>

  <path d="M 700 240 L 700 270" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============== STEP 2 Tokenization ============== -->
  <g>
    <rect x="40" y="278" width="1320" height="120" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
    <rect x="40" y="278" width="1320" height="28" rx="10" fill="#6d28d9"/>
    <text x="56" y="298" class="tag">STEP 2 · Tokenization</text>
    <text x="56" y="330" class="modTitle">TokenizerManager.generate_request()</text>
    <text x="56" y="350" class="modPath">python/sgl_jax/srt/managers/tokenizer_manager.py</text>
    <text x="56" y="370" class="modSub">Convert messages to token IDs, create <tspan class="codeKey">Req</tspan> object</text>
    <text x="56" y="388" class="modSub">Send <tspan class="codeKey">TokenizedGenerateReqInput</tspan> to Scheduler via ZMQ</text>
  </g>

  <path d="M 700 398 L 700 428" stroke="#15803d" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="712" y="420" class="edge">ZMQ IPC →</text>

  <!-- ============== STEP 3 Scheduling ============== -->
  <g>
    <rect x="40" y="436" width="1320" height="140" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <rect x="40" y="436" width="1320" height="28" rx="10" fill="#15803d"/>
    <text x="56" y="456" class="tag">STEP 3 · Scheduling &amp; Batch Construction</text>
    <text x="56" y="488" class="modTitle">Scheduler.event_loop_normal()</text>
    <text x="56" y="508" class="modPath">python/sgl_jax/srt/managers/scheduler.py</text>
    <text x="56" y="528" class="modSub">• Receive new requests, add to <tspan class="codeKey">waiting_queue</tspan></text>
    <text x="56" y="548" class="modSub">• Call <tspan class="codeKey">get_next_batch_to_run()</tspan> to build Batch, allocate KV Cache</text>
    <text x="56" y="568" class="modSub">• Return <tspan class="codeKey">ScheduleBatch</tspan> (contains input_ids, positions, req_pool_indices, etc.)</text>
  </g>

  <path d="M 700 576 L 700 606" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============== STEP 4 Model Forward ============== -->
  <g>
    <rect x="40" y="614" width="1320" height="160" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <rect x="40" y="614" width="1320" height="28" rx="10" fill="#15803d"/>
    <text x="56" y="634" class="tag">STEP 4 · Model Forward Inference</text>
    <text x="56" y="666" class="modTitle">ModelWorker.forward_batch_generation()</text>
    <text x="56" y="686" class="modPath">python/sgl_jax/srt/managers/tp_worker.py</text>
    <text x="56" y="706" class="modSub">• Convert <tspan class="codeKey">ScheduleBatch</tspan> to <tspan class="codeKey">ModelWorkerBatch</tspan></text>
    <text x="56" y="726" class="modSub">• Invoke model <tspan class="codeKey">model(input_ids, positions, ...)</tspan></text>
    <text x="56" y="746" class="modSub">• Model computes layer-by-layer, using Attention Backend to read/write KV Cache</text>
    <text x="56" y="766" class="modSub">• Return logits (shape: [batch_size, vocab_size])</text>
  </g>

  <path d="M 700 774 L 700 804" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============== STEP 5 Sampling ============== -->
  <g>
    <rect x="40" y="812" width="1320" height="140" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <rect x="40" y="812" width="1320" height="28" rx="10" fill="#15803d"/>
    <text x="56" y="832" class="tag">STEP 5 · Sampling</text>
    <text x="56" y="864" class="modTitle">ModelWorker.sample()</text>
    <text x="56" y="884" class="modPath">python/sgl_jax/srt/managers/tp_worker.py</text>
    <text x="56" y="904" class="modSub">• Apply temperature / top_p / top_k and other sampling parameters</text>
    <text x="56" y="924" class="modSub">• Generate next token ID</text>
    <text x="56" y="944" class="modSub">• Return <tspan class="codeKey">next_token_ids</tspan></text>
  </g>

  <path d="M 700 952 L 700 982" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============== STEP 6 Update State ============== -->
  <g>
    <rect x="40" y="990" width="1320" height="140" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <rect x="40" y="990" width="1320" height="28" rx="10" fill="#15803d"/>
    <text x="56" y="1010" class="tag">STEP 6 · Update State</text>
    <text x="56" y="1042" class="modTitle">Scheduler.process_batch_result()</text>
    <text x="56" y="1062" class="modPath">python/sgl_jax/srt/managers/scheduler.py</text>
    <text x="56" y="1082" class="modSub">• Update request state (Prefill → Decode or continue Decode)</text>
    <text x="56" y="1102" class="modSub">• Detect stop condition (EOS / max_tokens / stop_strings)</text>
    <text x="56" y="1122" class="modSub">• Send <tspan class="codeKey">BatchTokenIDOut</tspan> to DetokenizerManager</text>
  </g>

  <path d="M 700 1130 L 700 1160" stroke="#0e7490" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="712" y="1152" class="edge">ZMQ IPC →</text>

  <!-- ============== STEP 7 Detokenization ============== -->
  <g>
    <rect x="40" y="1168" width="1320" height="120" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
    <rect x="40" y="1168" width="1320" height="28" rx="10" fill="#0e7490"/>
    <text x="56" y="1188" class="tag">STEP 7 · Detokenization</text>
    <text x="56" y="1220" class="modTitle">DetokenizerManager.event_loop()</text>
    <text x="56" y="1240" class="modPath">python/sgl_jax/srt/managers/detokenizer_manager.py</text>
    <text x="56" y="1260" class="modSub">• Receive token IDs, incrementally decode to text</text>
    <text x="56" y="1280" class="modSub">• Send <tspan class="codeKey">BatchStrOut</tspan> back to TokenizerManager</text>
  </g>

  <path d="M 700 1288 L 700 1318" stroke="#6d28d9" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="712" y="1310" class="edge">ZMQ IPC →</text>

  <!-- ============== STEP 8 Result Aggregation ============== -->
  <g>
    <rect x="40" y="1326" width="1320" height="120" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
    <rect x="40" y="1326" width="1320" height="28" rx="10" fill="#6d28d9"/>
    <text x="56" y="1346" class="tag">STEP 8 · Result Aggregation</text>
    <text x="56" y="1378" class="modTitle">TokenizerManager receives and aggregates completed requests</text>
    <text x="56" y="1398" class="modPath">python/sgl_jax/srt/managers/tokenizer_manager.py</text>
    <text x="56" y="1418" class="modSub">• Receive detokenized text, update <tspan class="codeKey">Req</tspan> object</text>
    <text x="56" y="1438" class="modSub">• For streaming: incrementally return via SSE; non-streaming: wait for completion</text>
  </g>

  <path d="M 700 1446 L 700 1476" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============== STEP 9 HTTP Response ============== -->
  <g>
    <rect x="40" y="1484" width="1320" height="100" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
    <rect x="40" y="1484" width="1320" height="28" rx="10" fill="#6d28d9"/>
    <text x="56" y="1504" class="tag">STEP 9 · HTTP Response</text>
    <text x="56" y="1536" class="modTitle">Return ChatCompletionResponse</text>
    <text x="56" y="1556" class="modPath">python/sgl_jax/srt/entrypoints/http_server.py</text>
    <text x="56" y="1576" class="modSub">FastAPI serializes result to JSON and returns to client (or SSE stream)</text>
  </g>

  <!-- Loop arrow -->
  <path d="M 1360 1030 L 1380 1030 L 1380 576 L 700 576" stroke="#b45309" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)" stroke-dasharray="8,4"/>
  <text x="1300" y="800" class="edge" fill="#b45309">Loop until</text>
  <text x="1300" y="820" class="edge" fill="#b45309">request completes</text>

  <!-- Footer notes -->
  <g>
    <rect x="40" y="1620" width="1320" height="280" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
    <rect x="40" y="1620" width="1320" height="28" rx="10" fill="#b45309"/>
    <text x="56" y="1640" class="tag">Key Design Notes</text>

    <text x="56" y="1672" class="modTitle">3-Process Architecture</text>
    <text x="56" y="1692" class="modSub">• <tspan class="codeKey">Main Process</tspan>: HTTP Server + TokenizerManager (Tokenization + Result Aggregation)</text>
    <text x="56" y="1710" class="modSub">• <tspan class="codeKey">Subprocess 1</tspan>: Scheduler + ModelWorker (Scheduling + Model Inference + Sampling)</text>
    <text x="56" y="1728" class="modSub">• <tspan class="codeKey">Subprocess 2</tspan>: DetokenizerManager (Incremental Detokenization)</text>

    <text x="56" y="1756" class="modTitle">Continuous Batching</text>
    <text x="56" y="1776" class="modSub">• Each forward step (3-6) processes a dynamic Batch; requests can join or leave anytime</text>
    <text x="56" y="1794" class="modSub">• Prefill and Decode requests can be mixed in the same Batch</text>

    <text x="56" y="1822" class="modTitle">Data Flow</text>
    <text x="56" y="1842" class="modSub">• TokenizerManager → Scheduler: <tspan class="codeKey">TokenizedGenerateReqInput</tspan> (token IDs and sampling params for new requests)</text>
    <text x="56" y="1860" class="modSub">• Scheduler → DetokenizerManager: <tspan class="codeKey">BatchTokenIDOut</tspan> (generated token IDs and metadata)</text>
    <text x="56" y="1878" class="modSub">• DetokenizerManager → TokenizerManager: <tspan class="codeKey">BatchStrOut</tspan> (incrementally decoded text)</text>
  </g>
</svg>
