<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
<defs>
  <marker id="arr-navy" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1e3a5f"/></marker>
  <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#047857"/></marker>
  <marker id="arr-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#be185d"/></marker>
</defs>
<rect x="0" y="0" width="900" height="420" fill="#ffffff"/>

<text x="450" y="42" fill="#1e40af" font-size="24" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">EAGLE Draft-Verify Cycle</text>

<!-- 1. Draft Phase -->
<rect x="60" y="80" width="200" height="65" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
<text x="160" y="105" fill="#047857" font-size="13" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">1. Draft Phase</text>
<text x="160" y="125" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">EAGLE Model × K</text>

<path d="M 260 112 L 308 112" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-navy)"/>

<!-- 2. Tree Build -->
<rect x="310" y="80" width="200" height="65" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="410" y="105" fill="#b45309" font-size="13" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">2. Tree Build</text>
<text x="410" y="125" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">LCRS Structure</text>

<path d="M 510 112 L 558 112" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-navy)"/>

<!-- 3. Target Verify -->
<rect x="560" y="80" width="200" height="65" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="660" y="105" fill="#7c3aed" font-size="13" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">3. Target Verify</text>
<text x="660" y="125" fill="#64748b" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">Full Model Forward</text>

<path d="M 660 145 L 660 188" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-navy)"/>

<!-- 4. Accept? diamond -->
<polygon points="660,190 760,235 660,280 560,235" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
<text x="660" y="240" fill="#be185d" font-size="13" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">4. Accept?</text>

<!-- Accept loops back to Draft -->
<path d="M 560 235 L 160 235 L 160 147" fill="none" stroke="#047857" stroke-width="2" marker-end="url(#arr-green)"/>
<rect x="270" y="222" width="240" height="22" rx="6" fill="#ecfdf5" stroke="#047857" stroke-width="1"/>
<text x="390" y="237" fill="#047857" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">accept → back to Draft Phase</text>

<!-- Reject -->
<path d="M 760 235 L 798 235" fill="none" stroke="#be185d" stroke-width="2" marker-end="url(#arr-pink)"/>
<rect x="800" y="218" width="80" height="34" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
<text x="840" y="240" fill="#be185d" font-size="13" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="middle">Reject</text>

<!-- Footer note -->
<rect x="60" y="310" width="780" height="92" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="80" y="332" fill="#1e40af" font-size="12" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="start">Greedy Verify</text>
<text x="200" y="332" fill="#374151" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="start">argmax(target) == draft_token → accept, otherwise reject + rollback</text>
<text x="80" y="355" fill="#1e40af" font-size="12" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="start">Stochastic</text>
<text x="200" y="355" fill="#374151" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="start">p(target) &gt; threshold → accept; reject → relu(q-p) residual sampling</text>
<text x="80" y="378" fill="#1e40af" font-size="12" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="start">KV Cache</text>
<text x="200" y="378" fill="#374151" font-size="11" font-family='"Cascadia Code", "Fira Code", monospace' text-anchor="start">Draft and Target share KV Pool; trim un-accepted KV entries after verify</text>
</svg>
