# Ling-mini-2.0 GRPO with AInfer rollout engine on 2x2 TPU v6e
model_config:
  model_name: "ling-mini-2.0"
  model_source: "huggingface"
  model_download_path: "/tmp/models"
  intermediate_ckpt_dir: "/tmp/intermediate_ckpt/"
  use_tied_embedding: false

reference_model_config:
  model_id: "inclusionAI/Ling-mini-2.0"
  mesh: null
  same_mesh_as: "actor"

actor_model_config:
  mesh:
    shape: "(4, 1)"
    axis_names: "('fsdp','tp')"
  lora_config:
    module_path: ".*q_proj|.*k_proj|.*v_proj|.*o_proj|.*gate_proj|.*up_proj|.*down_proj|.*router"
    rank: 64
    alpha: 2.0

rollout_model_config:
  mesh: null
  same_mesh_as: "actor"

tokenizer_config:
  tokenizer_type: "huggingface"
  tokenizer_path: "inclusionAI/Ling-mini-2.0"
  add_bos: true
  add_eos: false

data_source: "tfds"
dataset_name: "gsm8k"
batch_size: 1
num_batches: 0
num_train_epochs: 1
apply_chat_template_to_dataset: true
tfds_download: true
offload_to_cpu: false

rl_training_config:
  max_steps: 5
  eval_every_n_steps: 5
  checkpoint_root_directory: "/tmp/ckpts"
  actor_optimizer_config:
    opt_type: "adamw"
    learning_rate: 1e-6
    b1: 0.9
    b2: 0.95
    eps: 1e-4
    weight_decay: 0.0

rollout_config:
  total_generation_steps: 128
  max_prompt_length: 256
  temperature: 0.9
  top_p: 1.0
  top_k: 50
  rollout_ainfer_model_version: "inclusionAI/Ling-mini-2.0"
  rollout_ainfer_mem_fraction_static: 0.60
  rollout_ainfer_init_with_random_weights: true
  rollout_ainfer_multi_step: 8
  rollout_ainfer_async_dispatch: true
  rollout_ainfer_overlap: true
  rollout_ainfer_moe_kernel_version: 1
  rollout_ainfer_max_num_seqs: 32
  rollout_ainfer_bs_paddings: [1, 2, 4, 8]
  rollout_ainfer_token_paddings: [128, 256]
  rollout_ainfer_page_size: 128

rollout_engine: "ainfer"

grpo_config:
  num_generations: 2
  num_iterations: 1
  beta: 0.08
  epsilon: 0.2

reward_functions:
  - "tunix/cli/reward_fn/gsm8k.py"
