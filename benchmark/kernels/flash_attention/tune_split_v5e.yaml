# sky launch benchmark/kernels/flash_attention/tune_split_v5e.yaml -n tune-split-v5e -y
#
# Purpose: Tune split kernel block sizes on TPU v5e (v5litepod-1, ~$1.20/hr)
# v5e has 16GB HBM, so we limit kv_heads <= 8 and kv_cache_tokens to 200000.

resources:
  accelerators: tpu-v5litepod-1
  accelerator_args:
    tpu_vm: true

setup: |
  set -euxo pipefail

  if [ ! -d ~/sglang-jax/.git ]; then
    git clone https://github.com/sgl-project/sglang-jax.git ~/sglang-jax
  fi

  cd ~/sglang-jax
  git fetch origin feat/support_spilt_kv
  git checkout feat/support_spilt_kv
  git pull origin feat/support_spilt_kv

  if ! command -v uv >/dev/null 2>&1; then
    pip install uv
  fi
  if [ ! -f .venv/bin/activate ]; then
    uv venv --python 3.12
  fi
  source .venv/bin/activate
  uv pip install -e "python[all]"

run: |
  set -euxo pipefail
  cd ~/sglang-jax
  source .venv/bin/activate

  echo "========== Split Kernel Block Size Tuning (TPU v5e) =========="
  cd benchmark/kernels/flash_attention
  python get_split_block_spec_config.py \
    --max-kv-cache-tokens 200000 \
    --max-kv-heads 8
