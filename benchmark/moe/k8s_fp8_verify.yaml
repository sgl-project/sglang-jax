# Headless Service for TPU worker DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: fp8-verify-svc
spec:
  clusterIP: None
  selector:
    job-name: fp8-verify
  ports:
    - name: tpu-data
      port: 8471
      targetPort: 8471
    - name: tpu-coord
      port: 8081
      targetPort: 8081
---
# v6e-16 TPU Job (4 hosts x 4 chips, all ICI)
apiVersion: batch/v1
kind: Job
metadata:
  name: fp8-verify
spec:
  completionMode: Indexed
  completions: 4
  parallelism: 4
  backoffLimit: 0
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: gcs-account
      subdomain: fp8-verify-svc
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
        cloud.google.com/gke-tpu-topology: "4x4"
      tolerations:
        - key: google.com/tpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: dev-shm
          emptyDir:
            medium: Memory
      containers:
        - name: verify
          image: python:3.12-slim
          ports:
            - containerPort: 8471
            - containerPort: 8081
          resources:
            requests:
              google.com/tpu: "4"
            limits:
              google.com/tpu: "4"
          volumeMounts:
            - mountPath: /dev/shm
              name: dev-shm
          env:
            - name: TPU_WORKER_HOSTNAMES
              value: "fp8-verify-0.fp8-verify-svc,fp8-verify-1.fp8-verify-svc,fp8-verify-2.fp8-verify-svc,fp8-verify-3.fp8-verify-svc"
            - name: TPU_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
            - name: BENCH_BRANCH
              value: "exp/scatter-optimization"
            - name: BENCH_REPO
              value: "https://github.com/primatrix/sglang-jax.git"
            - name: PYTHONUNBUFFERED
              value: "1"
          command:
            - bash
            - -c
            - |
              set -xuo pipefail
              unset CLOUD_TPU_TASK_ID
              export TPU_WORKER_ID=$JOB_COMPLETION_INDEX
              export PYTHONUNBUFFERED=1

              echo "=== Worker $TPU_WORKER_ID starting ==="

              # Install tools
              apt-get update -qq && apt-get install -yqq git curl procps > /dev/null 2>&1

              # Install JAX TPU
              pip install -q jax[tpu] -f https://storage.googleapis.com/jax-releases/libtpu_releases.html 2>&1 | tail -5
              pip install -q flax 2>&1 | tail -1

              # Clone repo
              git clone --branch "$BENCH_BRANCH" --depth 1 "$BENCH_REPO" /workspace
              cd /workspace
              pip install -q -e "./python[tpu]" 2>&1 | tail -5

              echo "=== Worker $TPU_WORKER_ID: pip install done, waiting for peers ==="
              # Simple barrier: wait for all workers' DNS to resolve
              for host in fp8-verify-0.fp8-verify-svc fp8-verify-1.fp8-verify-svc fp8-verify-2.fp8-verify-svc fp8-verify-3.fp8-verify-svc; do
                until getent hosts "$host" > /dev/null 2>&1; do
                  echo "Waiting for $host..."
                  sleep 2
                done
              done
              # Extra settle time for slower workers to finish pip install
              sleep 15

              echo "=== Worker $TPU_WORKER_ID: Running FP8 precision verification ==="

              # Run verification (the script handles JAX init internally)
              python -m benchmark.moe.verify_fp8_precision 2>&1
              VERIFY_EXIT=$?
              echo "=== Verification finished with exit code $VERIFY_EXIT ==="
              exit $VERIFY_EXIT
