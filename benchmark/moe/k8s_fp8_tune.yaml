# Headless Service for TPU worker DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: fp8-tune-svc
spec:
  clusterIP: None
  selector:
    job-name: fp8-tune
  ports:
    - name: tpu-data
      port: 8471
      targetPort: 8471
    - name: tpu-coord
      port: 8081
      targetPort: 8081
---
# v6e-16 TPU Job (4 hosts x 4 chips, all ICI)
apiVersion: batch/v1
kind: Job
metadata:
  name: fp8-tune
spec:
  completionMode: Indexed
  completions: 4
  parallelism: 4
  backoffLimit: 0
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: gcs-account
      subdomain: fp8-tune-svc
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
        cloud.google.com/gke-tpu-topology: "4x4"
      tolerations:
        - key: google.com/tpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: dev-shm
          emptyDir:
            medium: Memory
        - name: gcs-storage
          persistentVolumeClaim:
            claimName: moe-bench-gcs-pvc
      containers:
        - name: bench
          image: python:3.12-slim
          ports:
            - containerPort: 8471
            - containerPort: 8081
          resources:
            requests:
              google.com/tpu: "4"
            limits:
              google.com/tpu: "4"
          volumeMounts:
            - mountPath: /dev/shm
              name: dev-shm
            - mountPath: /gcs
              name: gcs-storage
          env:
            - name: TPU_WORKER_HOSTNAMES
              value: "fp8-tune-0.fp8-tune-svc,fp8-tune-1.fp8-tune-svc,fp8-tune-2.fp8-tune-svc,fp8-tune-3.fp8-tune-svc"
            - name: TPU_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
            - name: BENCH_BRANCH
              value: "exp/scatter-optimization"
            - name: BENCH_REPO
              value: "https://github.com/primatrix/sglang-jax.git"
            - name: PROFILE_DIR
              value: "/gcs/prayer/moe_profiling/20260408_fp8_tune_foriloop"
            - name: PYTHONUNBUFFERED
              value: "1"
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              unset CLOUD_TPU_TASK_ID
              export TPU_WORKER_ID=$JOB_COMPLETION_INDEX
              export PYTHONUNBUFFERED=1

              echo "=== Worker $TPU_WORKER_ID starting ==="

              # Install tools
              apt-get update -qq && apt-get install -yqq git curl procps > /dev/null 2>&1

              # Install JAX TPU
              pip install -q jax[tpu] -f https://storage.googleapis.com/jax-releases/libtpu_releases.html 2>&1 | tail -5
              pip install -q flax 2>&1 | tail -1

              # Clone repo
              git clone --branch "$BENCH_BRANCH" --depth 1 "$BENCH_REPO" /workspace
              cd /workspace
              pip install -q -e "./python[tpu]" 2>&1 | tail -5

              # Verify imports
              python3 -c "import sgl_jax; print('sgl_jax import OK')"

              # JAX/TPU diagnostics
              python3 -c "
              import jax
              print(f'JAX version: {jax.__version__}')
              print(f'Backend: {jax.default_backend()}')
              print(f'Devices: {jax.device_count()}')
              print(f'Local devices: {jax.local_device_count()}')
              for d in jax.devices()[:4]:
                  print(f'  {d}')
              " 2>&1

              echo "=== Worker $TPU_WORKER_ID: JAX init done ==="

              # Run FP8 block config tuning with optimized fori_loop kernel
              mkdir -p "$PROFILE_DIR"

              python -m benchmark.moe.bench_fused_moe \
                --tune-block-config \
                --weight-dtype float8_e4m3fn \
                --num-experts 256 --top-k 8 \
                --hidden-size 4096 --intermediate-size 2048 \
                --num-tokens 16 32 64 128 256 512 1024 2048 4096 8192 16384 32768 \
                --imbalance-mode balanced \
                --max-configs 25 \
                --iters 5 --warmup-iters 2 \
                --tpu-vmem-budget-mb 96 \
                2>&1 | tee "$PROFILE_DIR/fp8_tune_worker${TPU_WORKER_ID}.log"
