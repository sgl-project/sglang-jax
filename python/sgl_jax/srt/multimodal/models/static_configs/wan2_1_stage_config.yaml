model_arch: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
# how can we mapping model name to stage config yaml and impl class
stage_args:
 - stage_id: 0
   stage_sub_dir: text_encoder
   runtime:
     num_tpus: 2
     max_batch_size: 1
   scheduler: text_encoder
   final_output: false
   scheduler_params: {"tokenizers": "tokenizer"}
   model_class: UMT5EncoderModel

 - stage_id: 1
   stage_sub_dir: transformer
   runtime:
     num_tpus: 1
     max_batch_size: 1
   scheduler: diffusion
   scheduler_params: {"Scheduler": "FlowUniPCMultistepScheduler"}
   precompile_params: {"input_embedding": False, "deepstack_visual_embedding": False}
   model_class: WanTransformer3DModel
   final_output: false

 - stage_id: 2
   stage_sub_dir: vae
   runtime:
     num_tpus: 1
     max_batch_size: 1
   scheduler: vae
   scheduler_params: {}
   model_class: AutoencoderKLWan
   final_output: true
