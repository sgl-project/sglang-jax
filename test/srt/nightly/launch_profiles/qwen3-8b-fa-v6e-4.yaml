# Qwen3-8B dense on v6e-4, TP4, fa attention backend (issue #1200, 1.1.1).
name: qwen3_8b-fa-tp4
target: v6e-4
model_path: Qwen/Qwen3-8B
tp_size: 4
dp_size: 1
port: 30010
server_args:
  - --skip-server-warmup
  - --random-seed
  - "3"
  - --download-dir
  - /dev/shm/
  - --dtype
  - bfloat16
  - --page-size
  - "256"
  - --attention-backend
  - fa
  - --mem-fraction-static
  - "0.9"
  - --max-prefill-tokens
  - "8192"
  - --max-running-requests
  - "128"
