name: qwen3_5_a3b-recurrent-min_running-tp4-dp2-ep4
target: v6e-4
# Contrast sibling of the cache_aware profile (single-host dp2/ep4) — identical
# except the routing policy. min_running reuse is bounded by ~1/dp_size, so its
# knee falls below predict_knee (reported, not gated).
model_path: Qwen/Qwen3.5-35B-A3B
tp_size: 4
dp_size: 2
ep_size: 4
port: 30051
check_cache_miss: false  # dynamic-shape reuse-sweep
server_args:
  - --trust-remote-code
  - --skip-server-warmup
  - --dtype
  - bfloat16
  - --attention-backend
  - fa
  - --page-size
  - "128"
  - --context-length
  - "8192"
  - --chunked-prefill-size
  - "512"
  - --mem-fraction-static
  - "0.8"
  - --max-running-requests
  - "16"
  - --random-seed
  - "42"
  - --disable-overlap-schedule
  - --enable-unified-radix-tree
  - --enable-recurrent-extra-buffer
  - --max-recurrent-state-size
  - "96"
  - --dp-schedule-policy
  - min_running_queue
  - --precompile-bs-paddings
  - "8"
  - "16"
  - --precompile-token-paddings
  - "512"
  - "1024"
