name: qwen3_5_a3b-no_cache-tp16-dp4
target: v6e-4x4
# A/B floor: radix cache disabled (no prefix reuse). Same model/topology as the
# recurrent profiles, used by the no-cache vs min_running vs cache_aware serving
# A/B (Phase 3b). dp routing still applies; there is just no cache to reuse.
model_path: Qwen/Qwen3.5-35B-A3B
tp_size: 16
dp_size: 4
port: 30052
check_cache_miss: false  # dynamic-shape reuse-sweep / A/B benches
server_args:
  - --trust-remote-code
  - --skip-server-warmup
  - --dtype
  - bfloat16
  - --attention-backend
  - fa
  - --page-size
  - "128"
  - --context-length
  - "8192"
  - --mem-fraction-static
  - "0.8"
  - --max-running-requests
  - "32"
  - --random-seed
  - "42"
  - --disable-overlap-schedule
  - --disable-radix-cache
  - --precompile-bs-paddings
  - "32"
  - "64"
  - --precompile-token-paddings
  - "512"
  - "1024"
