name: Nightly Release Gateway

on:
  workflow_call:
    inputs:
      skip_nightly_check:
        description: "Emergency override for the nightly health gate"
        required: false
        default: false
        type: boolean
      emergency_justification:
        description: "Required when skip_nightly_check is true"
        required: false
        default: ""
        type: string
      status_url:
        description: "URL for nightly-status.json"
        required: false
        default: "https://raw.githubusercontent.com/pathfinder-pf/sglang-jax-ci-data/main/nightly-status/nightly-status.json"
        type: string
      tag:
        description: "Release tag under review"
        required: false
        default: ""
        type: string
      version:
        description: "Release version under review"
        required: false
        default: ""
        type: string
    outputs:
      gateway-status:
        description: "pass, fail, or emergency"
        value: ${{ jobs.gateway.outputs.gateway-status }}
      audit-issue-number:
        description: "Audit issue number for emergency overrides"
        value: ${{ jobs.gateway.outputs.audit-issue-number }}

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  gateway:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: ubuntu-latest
    outputs:
      gateway-status: ${{ steps.check.outputs.gateway_status }}
      audit-issue-number: ${{ steps.check.outputs.audit_issue_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download nightly status
        if: ${{ ! inputs.skip_nightly_check }}
        env:
          STATUS_URL: ${{ inputs.status_url }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "$STATUS_URL" --output nightly-status.json

      - name: Find latest completed nightly
        if: ${{ ! inputs.skip_nightly_check }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh api "repos/$REPO/actions/workflows/nightly-test-daily.yml/runs" \
            --method GET \
            -f branch=main -f status=completed -f per_page=1 \
            --jq '.workflow_runs[0] // empty | {run_id: (.id|tostring), run_url: .html_url, conclusion: .conclusion, completed_at: .updated_at}' \
            > latest_completed_nightly.json; then
            echo '{}' > latest_completed_nightly.json
          fi
          if [ ! -s latest_completed_nightly.json ]; then
            echo '{}' > latest_completed_nightly.json
          fi

      - name: Check nightly health
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SKIP_NIGHTLY_CHECK: ${{ inputs.skip_nightly_check }}
          EMERGENCY_JUSTIFICATION: ${{ inputs.emergency_justification }}
          STATUS_URL: ${{ inputs.status_url }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          args=(check --status nightly-status.json)
          if [ -f latest_completed_nightly.json ]; then
            args+=(--latest-completed-nightly latest_completed_nightly.json)
          fi
          if [ "$SKIP_NIGHTLY_CHECK" = "true" ]; then
            args+=(
              --skip-nightly-check
              --emergency-justification "$EMERGENCY_JUSTIFICATION"
              --repo "$REPO"
              --status-url "$STATUS_URL"
              --actor "$ACTOR"
              --run-id "$RUN_ID"
              --run-url "$RUN_URL"
              --run-attempt "$RUN_ATTEMPT"
              --tag "$RELEASE_TAG"
              --version "$RELEASE_VERSION"
            )
          fi
          output=$(python3 scripts/ci/release_gate.py "${args[@]}" 2>&1)
          rc=$?
          printf '%s\n' "$output"
          gateway_status=$(printf '%s\n' "$output" | awk -F= '/^gateway-status=/{print $2; exit}')
          audit_issue_number=$(printf '%s\n' "$output" | awk -F= '/^audit-issue-number=/{print $2; exit}')
          if [ -z "$gateway_status" ]; then
            gateway_status=fail
          fi
          echo "gateway_status=$gateway_status" >> "$GITHUB_OUTPUT"
          echo "audit_issue_number=$audit_issue_number" >> "$GITHUB_OUTPUT"
          exit "$rc"
