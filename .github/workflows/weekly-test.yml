name: Weekly Test

# Runs every Sunday 00:00 UTC+8 — full regression on v6e-1 + v6e-4. The
# lightweight daily fallback lives in nightly-test-daily.yml. See #1117 for
# the nightly-vs-daily split discussion.

on:
  schedule:
    - cron: '0 16 * * 0'
  push:
    branches:
      - main
    paths:
      - "python/sgl_jax/version.py"
  workflow_dispatch:
concurrency:
  group: weekly-test-${{ github.ref }}
  cancel-in-progress: true

jobs:

  nightly-test-accuracy-text-models-1-tpu:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: arc-runner-v6e-1
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
        with:
          extra-packages: 'evalscope==1.0.0'
      - name: Run eval test for text models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: ${{ vars.HF_HUB_DOWNLOAD_TIMEOUT }}
          JAX_DEBUG_LOG_MODULES: jax._src.compilation_cache_utils
        timeout-minutes: 1000
        run: |
          export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
          export BENCH_OUTPUT_DIR="$GITHUB_WORKSPACE/test/nightly_test_output/benchmark/$OUTPUT_DIR_NAME"
          echo "BENCH_OUTPUT_DIR=$BENCH_OUTPUT_DIR" >> $GITHUB_ENV
          mkdir -p $BENCH_OUTPUT_DIR

          bash scripts/killall_sglang.sh
          cd test/srt
          python3 run_suite.py --suite nightly-test-accuracy-text-models-tpu-v6e-1 --auto-partition-id ${{ matrix.part }} --auto-partition-size 1 --reruns 2
      - name: Publish traces to storage repo
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 scripts/ci/publish.py --data-type bench --source-dir ./test/nightly_test_output

      - name: Generate CSV Entry and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        if: always()
        run: |
          mkdir -p ./test
          SHA=${{ github.sha }}
          AUTHOR=$(git log -1 --pretty=%an)
          MSG=$(git log -1 --pretty=%B | tr -d ',' | head -n 1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
          FILE="./meta/benchmark/"$OUTPUT_DIR_NAME"/nightly_report.csv"
          mkdir -p ./meta/benchmark/$OUTPUT_DIR_NAME
          if [ ! -f "$FILE" ]; then
            echo "SHA,Author,Commit_Msg,Run_URL" > $FILE
          fi
          echo "$SHA,$AUTHOR,$MSG,$RUN_URL" >> $FILE
          echo "CSV line added: $SHA, $AUTHOR, $MSG"
          python3 scripts/ci/publish.py --data-type bench --source-dir ./meta


  nightly-test-accuracy-text-models-4-tpu:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: arc-runner-v6e-4
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1, 2]
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
        with:
          extra-packages: 'evalscope==1.0.0'
      - name: Run eval test for text models
        env:
            HF_TOKEN: ${{ secrets.HF_TOKEN }}
            HF_HUB_DOWNLOAD_TIMEOUT: ${{ vars.HF_HUB_DOWNLOAD_TIMEOUT }}
            JAX_DEBUG_LOG_MODULES: jax._src.compilation_cache_utils
        timeout-minutes: 1200
        run: |
          export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
          export BENCH_OUTPUT_DIR="$GITHUB_WORKSPACE/test/nightly_test_output/benchmark/$OUTPUT_DIR_NAME"
          echo "BENCH_OUTPUT_DIR=$BENCH_OUTPUT_DIR" >> $GITHUB_ENV
          mkdir -p $BENCH_OUTPUT_DIR

          bash scripts/killall_sglang.sh
          cd test/srt
          python3 run_suite.py --suite nightly-test-accuracy-text-models-tpu-v6e-4 --auto-partition-id ${{ matrix.part }} --auto-partition-size 3 --reruns 2
      - name: Publish traces to storage repo
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 scripts/ci/publish.py --data-type bench --source-dir ./test/nightly_test_output


  nightly-test-perf-text-models-1-tpu:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: arc-runner-v6e-1
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run performance test for text models
        timeout-minutes: 840
        env:

          TRACE_BASE_URL: https://raw.githubusercontent.com/sglang-bot/sglang-ci-data/main/traces/${{ github.run_id }}
          PERFETTO_RELAY_URL: ${{ vars.PERFETTO_RELAY_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: ${{ vars.HF_HUB_DOWNLOAD_TIMEOUT }}
          JAX_DEBUG_LOG_MODULES: jax._src.compilation_cache_utils
        run: |
          export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
          export PERF_OUTPUT_DIR="$GITHUB_WORKSPACE/test/nightly_test_output/perf/$OUTPUT_DIR_NAME"
          echo "PERF_OUTPUT_DIR=$PERF_OUTPUT_DIR" >> $GITHUB_ENV
          mkdir -p $PERF_OUTPUT_DIR



          bash scripts/killall_sglang.sh
          cd test/srt
          python3 run_suite.py --suite nightly-test-perf-text-models-tpu-v6e-1

      - name: Publish traces to storage repo
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |

          python3 scripts/ci/publish.py --data-type perf --source-dir ./test/nightly_test_output


  nightly-test-perf-text-models-4-tpu-part1:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: arc-runner-v6e-4
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run performance test for text models
        timeout-minutes: 430
        env:

          TRACE_BASE_URL: https://raw.githubusercontent.com/sglang-bot/sglang-ci-data/main/traces/${{ github.run_id }}
          PERFETTO_RELAY_URL: ${{ vars.PERFETTO_RELAY_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: ${{ vars.HF_HUB_DOWNLOAD_TIMEOUT }}
          JAX_DEBUG_LOG_MODULES: jax._src.compilation_cache_utils
        run: |
          export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
          export PERF_OUTPUT_DIR="$GITHUB_WORKSPACE/test/nightly_test_output/perf/$OUTPUT_DIR_NAME"
          echo "PERF_OUTPUT_DIR=$PERF_OUTPUT_DIR" >> $GITHUB_ENV
          mkdir -p $PERF_OUTPUT_DIR



          bash scripts/killall_sglang.sh
          cd test/srt
          python3 run_suite.py --suite  nightly-test-perf-text-models-tpu-v6e-4-part1

      - name: Publish traces to storage repo
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 scripts/ci/publish.py --data-type perf --source-dir ./test/nightly_test_output

      - name: Generate CSV Entry and publish
        env:
            GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
            GITHUB_RUN_ID: ${{ github.run_id }}
            GITHUB_RUN_NUMBER: ${{ github.run_number }}
        if: always()
        run: |
          mkdir -p ./test
          SHA=${{ github.sha }}
          AUTHOR=$(git log -1 --pretty=%an)
          MSG=$(git log -1 --pretty=%B | tr -d ',' | head -n 1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
          FILE="./meta/perf/"$OUTPUT_DIR_NAME"/nightly_report.csv"
          mkdir -p ./meta/perf/$OUTPUT_DIR_NAME
          if [ ! -f "$FILE" ]; then
            echo "SHA,Author,Commit_Msg,Run_URL" > $FILE
          fi
          echo "$SHA,$AUTHOR,$MSG,$RUN_URL" >> $FILE
          echo "CSV line added: $SHA, $AUTHOR, $MSG"
          python3 scripts/ci/publish.py --data-type perf --source-dir ./meta


  nightly-test-perf-text-models-4-tpu-part2:
      if: github.repository == 'sgl-project/sglang-jax'
      runs-on: arc-runner-v6e-4
      env:
        TZ: Asia/Shanghai
        JAX_COMPILATION_CACHE_DIR: /xla-cache
        SGLANG_JAX_MODEL_CACHE: /models/model_scope
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Python environment
          uses: ./.github/actions/setup-venv
        - name: Run performance test for text models
          timeout-minutes: 390
          env:

            TRACE_BASE_URL: https://raw.githubusercontent.com/sglang-bot/sglang-ci-data/main/traces/${{ github.run_id }}
            PERFETTO_RELAY_URL: ${{ vars.PERFETTO_RELAY_URL }}
            HF_TOKEN: ${{ secrets.HF_TOKEN }}
            HF_HUB_DOWNLOAD_TIMEOUT: ${{ vars.HF_HUB_DOWNLOAD_TIMEOUT }}
            JAX_DEBUG_LOG_MODULES: jax._src.compilation_cache_utils
          run: |
            export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
            export PERF_OUTPUT_DIR="$GITHUB_WORKSPACE/test/nightly_test_output/perf/$OUTPUT_DIR_NAME"
            echo "PERF_OUTPUT_DIR=$PERF_OUTPUT_DIR" >> $GITHUB_ENV
            mkdir -p $PERF_OUTPUT_DIR



            bash scripts/killall_sglang.sh
            cd test/srt
            python3 run_suite.py --suite  nightly-test-perf-text-models-tpu-v6e-4-part2

        - name: Publish traces to storage repo
          env:
            GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
            GITHUB_RUN_ID: ${{ github.run_id }}
            GITHUB_RUN_NUMBER: ${{ github.run_number }}
          run: |
            python3 scripts/ci/publish.py --data-type perf --source-dir ./test/nightly_test_output


  nightly-test-perf-text-models-4-tpu-part3:
        if: github.repository == 'sgl-project/sglang-jax'
        runs-on: arc-runner-v6e-4
        env:
          TZ: Asia/Shanghai
          JAX_COMPILATION_CACHE_DIR: /xla-cache
          SGLANG_JAX_MODEL_CACHE: /models/model_scope
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Setup Python environment
            uses: ./.github/actions/setup-venv
          - name: Run performance test for text models
            timeout-minutes: 400
            env:

              TRACE_BASE_URL: https://raw.githubusercontent.com/sglang-bot/sglang-ci-data/main/traces/${{ github.run_id }}
              PERFETTO_RELAY_URL: ${{ vars.PERFETTO_RELAY_URL }}
              HF_TOKEN: ${{ secrets.HF_TOKEN }}
              HF_HUB_DOWNLOAD_TIMEOUT: ${{ vars.HF_HUB_DOWNLOAD_TIMEOUT }}
              JAX_DEBUG_LOG_MODULES: jax._src.compilation_cache_utils
            run: |
              export OUTPUT_DIR_NAME=$(date +'%Y-%m-%d')
              export PERF_OUTPUT_DIR="$GITHUB_WORKSPACE/test/nightly_test_output/perf/$OUTPUT_DIR_NAME"
              echo "PERF_OUTPUT_DIR=$PERF_OUTPUT_DIR" >> $GITHUB_ENV
              mkdir -p $PERF_OUTPUT_DIR



              bash scripts/killall_sglang.sh
              cd test/srt
              python3 run_suite.py --suite  nightly-test-perf-text-models-tpu-v6e-4-part3

          - name: Publish traces to storage repo
            env:
              GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
              GITHUB_RUN_ID: ${{ github.run_id }}
              GITHUB_RUN_NUMBER: ${{ github.run_number }}
            run: |
              python3 scripts/ci/publish.py --data-type perf --source-dir ./test/nightly_test_output


  nightly-test-finish:
    needs: [
      nightly-test-accuracy-text-models-1-tpu,
      nightly-test-accuracy-text-models-4-tpu,
      nightly-test-perf-text-models-1-tpu,
      nightly-test-perf-text-models-4-tpu-part1,
      nightly-test-perf-text-models-4-tpu-part2,
      nightly-test-perf-text-models-4-tpu-part3,
    ]
    if: always() && github.repository == 'sgl-project/sglang-jax'
    runs-on: ubuntu-latest
    steps:
      - name: Check all nightly job statuses
        run: |
          echo "=== Nightly Test Results ==="
          echo "accuracy-1-tpu: ${{ needs.nightly-test-accuracy-text-models-1-tpu.result }}"
          echo "accuracy-4-tpu: ${{ needs.nightly-test-accuracy-text-models-4-tpu.result }}"
          echo "perf-text-1-tpu: ${{ needs.nightly-test-perf-text-models-1-tpu.result }}"
          echo "perf-text-4-tpu-part1: ${{ needs.nightly-test-perf-text-models-4-tpu-part1.result }}"
          echo "perf-text-4-tpu-part2: ${{ needs.nightly-test-perf-text-models-4-tpu-part2.result }}"
          echo "perf-text-4-tpu-part3: ${{ needs.nightly-test-perf-text-models-4-tpu-part3.result }}"
          echo ""

          has_failure=false
          for job_result in \
            "accuracy-1-tpu=${{ needs.nightly-test-accuracy-text-models-1-tpu.result }}" \
            "accuracy-4-tpu=${{ needs.nightly-test-accuracy-text-models-4-tpu.result }}" \
            "perf-text-1-tpu=${{ needs.nightly-test-perf-text-models-1-tpu.result }}" \
            "perf-text-4-tpu-part1=${{ needs.nightly-test-perf-text-models-4-tpu-part1.result }}" \
            "perf-text-4-tpu-part2=${{ needs.nightly-test-perf-text-models-4-tpu-part2.result }}" \
            "perf-text-4-tpu-part3=${{ needs.nightly-test-perf-text-models-4-tpu-part3.result }}"; do
            job_name="${job_result%%=*}"
            result="${job_result#*=}"
            if [ "$result" != "success" ]; then
              echo "::error::${job_name} did not succeed: ${result}"
              has_failure=true
            fi
          done

          if [ "$has_failure" = "true" ]; then
            echo "::error::One or more nightly test jobs failed"
            exit 1
          fi

          echo "All nightly test jobs passed"
