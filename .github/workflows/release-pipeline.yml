name: Release Pipeline

# Single user-facing entry point for the two-phase release flow.
# Phase 1 (tag job)     -> validates and pushes the annotated tag via release-tag.yml.
# Phase 2 (publish job) -> publishes wheel + image + GitHub Release via release.yml.
#
# release-tag.yml and release.yml remain individually dispatchable for advanced
# recovery flows (e.g. re-publishing from an existing tag without re-tagging).

on:
  # TODO(remove-before-merge): branch push trigger is only here so the workflow
  # appears in the Actions UI on feat/release-pipeline. Delete this `push` block
  # before merging — release-pipeline.yml should only run via workflow_dispatch.
  push:
    branches:
      - feat/release-pipeline
  workflow_dispatch:
    inputs:
      version:
        description: "Target version string without v prefix (e.g. 0.0.3, 0.0.3rc0, 0.0.3.post1)"
        required: true
        type: string
      dry_run:
        description: "If true, build and validate but skip tag push and publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  tag:
    # TODO(remove-before-merge): drop the event_name guard together with the `push` trigger above.
    if: github.repository == 'sgl-project/sglang-jax' && github.event_name != 'push'
    uses: ./.github/workflows/release-tag.yml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      dry_run: ${{ inputs.dry_run }}

  publish:
    needs: tag
    if: ${{ ! inputs.dry_run }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      tag: ${{ needs.tag.outputs.tag }}
      dry_run: false
