name: Release PyPI

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag to publish from (e.g. v0.0.3rc0)"
        required: true
        type: string
      version:
        description: "Version string without v prefix (e.g. 0.0.3rc0)"
        required: true
        type: string
      dry_run:
        description: "If true, build but do not publish"
        required: true
        type: boolean
      skip_nightly_check:
        description: "Emergency override for the nightly health gate"
        required: false
        default: false
        type: boolean
      emergency_justification:
        description: "Required when skip_nightly_check is true"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  gateway:
    if: github.repository == 'sgl-project/sglang-jax' && ! inputs.dry_run
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    outputs:
      gateway-status: ${{ steps.check.outputs.gateway_status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download nightly status
        if: ${{ ! inputs.skip_nightly_check }}
        env:
          STATUS_URL: "https://raw.githubusercontent.com/pathfinder-pf/sglang-jax-ci-data/main/nightly-status/nightly-status.json"
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "$STATUS_URL" --output nightly-status.json

      - name: Find latest completed nightly
        if: ${{ ! inputs.skip_nightly_check }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh api "repos/$REPO/actions/workflows/nightly-test-daily.yml/runs" \
            --method GET \
            -f branch=main -f status=completed -f per_page=1 \
            --jq '.workflow_runs[0] // empty | {run_id: (.id|tostring), run_url: .html_url, conclusion: .conclusion, completed_at: .updated_at}' \
            > latest_completed_nightly.json; then
            echo '{}' > latest_completed_nightly.json
          fi
          if [ ! -s latest_completed_nightly.json ]; then
            echo '{}' > latest_completed_nightly.json
          fi

      - name: Check nightly health
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SKIP_NIGHTLY_CHECK: ${{ inputs.skip_nightly_check }}
          EMERGENCY_JUSTIFICATION: ${{ inputs.emergency_justification }}
          STATUS_URL: "https://raw.githubusercontent.com/pathfinder-pf/sglang-jax-ci-data/main/nightly-status/nightly-status.json"
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          args=(check --status nightly-status.json)
          if [ -f latest_completed_nightly.json ]; then
            args+=(--latest-completed-nightly latest_completed_nightly.json)
          fi
          if [ "$SKIP_NIGHTLY_CHECK" = "true" ]; then
            args+=(
              --skip-nightly-check
              --emergency-justification "$EMERGENCY_JUSTIFICATION"
              --repo "$REPO"
              --status-url "$STATUS_URL"
              --actor "$ACTOR"
              --run-id "$RUN_ID"
              --run-url "$RUN_URL"
              --run-attempt "$RUN_ATTEMPT"
              --tag "$RELEASE_TAG"
              --version "$RELEASE_VERSION"
            )
          fi
          output=$(python3 scripts/ci/release_gate.py "${args[@]}" 2>&1)
          rc=$?
          printf '%s\n' "$output"
          gateway_status=$(printf '%s\n' "$output" | awk -F= '/^gateway-status=/{print $2; exit}')
          if [ -z "$gateway_status" ]; then
            gateway_status=fail
          fi
          echo "gateway_status=$gateway_status" >> "$GITHUB_OUTPUT"
          exit "$rc"

  publish:
    needs: gateway
    if: >-
      always() &&
      github.repository == 'sgl-project/sglang-jax' &&
      (inputs.dry_run || contains(fromJSON('["pass","emergency"]'), needs.gateway.outputs.gateway-status))
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.dry_run && github.ref || inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        env:
          VERSION: ${{ inputs.version }}
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          cd python
          cp ../README.md ../LICENSE .
          python -m pip install --upgrade pip build
          python -m build
          ls -la dist
          test -f "dist/sglang_jax-${VERSION}-py3-none-any.whl"

      - name: Smoke test wheel
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --upgrade pip
          /tmp/venv/bin/pip install "python/dist/sglang_jax-${VERSION}-py3-none-any.whl"
          /tmp/venv/bin/python -c 'import os, sgl_jax; expected = os.environ["VERSION"]; print("sgl_jax version:", sgl_jax.__version__); assert sgl_jax.__version__ == expected, sgl_jax.__version__'

      - name: Publish to PyPI
        if: ${{ ! inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
