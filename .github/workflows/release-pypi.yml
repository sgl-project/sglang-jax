name: Release PyPI

on:
  workflow_call:
    inputs:
      version:
        description: "Version string without v prefix (e.g. 0.0.3, 0.0.3rc0, 0.0.3.post1)"
        required: true
        type: string

jobs:
  publish:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging
        run: python -m pip install --upgrade packaging

      - name: Build wheel and sdist (make build-wheel)
        run: make build-wheel VERSION=${{ inputs.version }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
