          CASE_KEY: ${{ inputs.cases || 'recurrent-accuracy-v6e-4' }}
          RESULT: ${{ needs.nightly-recurrent-accuracy-4-tpu-daily.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then status="PASS"; else status="FAIL"; fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "> **Nightly (recurrent accuracy)** [\`$CASE_KEY\`]($RUN_URL): **$status**."


  # Trend drift: detect on v6e-4 (only it can read the /observability-storage
  # mount), alert from ubuntu (has gh), connected by a drift.json artifact.
  # Both continue-on-error so monitoring never fails the nightly run.
  nightly-trend-monitor:
    needs:
      - nightly-test-accuracy-text-models-4-tpu-daily
      - nightly-test-perf-text-models-4-tpu-daily
    if: always() && github.ref == 'refs/heads/main' && github.repository == 'sgl-project/sglang-jax' && inputs.pr_number == ''
    runs-on: arc-runner-v6e-4
    continue-on-error: true
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Detect trend drift
        # stdlib-only on purpose — no setup-venv. A 3rd-party import would
        # ImportError here, silently swallowed by continue-on-error.
        run: |
          if [ ! -d /observability-storage ]; then
            echo "::warning::/observability-storage not mounted; emitting empty drift report"
            echo '{"schema_version": 1, "configs": {}}' > drift.json
          else
            python3 scripts/ci/check_trend_threshold.py \
              --data-dir /observability-storage --output drift.json
          fi
      - name: Upload drift report
        uses: actions/upload-artifact@v5
        with:
          name: trend-drift-${{ github.run_id }}
          path: drift.json
          if-no-files-found: warn

  nightly-trend-alert:
    needs: nightly-trend-monitor
    if: always() && github.ref == 'refs/heads/main' && github.repository == 'sgl-project/sglang-jax' && inputs.pr_number == ''
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Download drift report
        uses: actions/download-artifact@v5
        # Tolerate a missing artifact (monitor crash) so the next step still
        # runs and warns, instead of the job silently vanishing.
        continue-on-error: true
        with:
          name: trend-drift-${{ github.run_id }}
      - name: Open/update issues + Slack
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # The script warns + exits 0 on missing/corrupt drift.json — a
          # transport failure is loud, not a silent "no drift".
          python3 scripts/ci/trend_alert_issues.py \
            --repo "${{ github.repository }}" --drift drift.json --slack-output slack.txt
          if [ -s slack.txt ] && [ -n "$SLACK_WEBHOOK_URL" ]; then
            jq -Rs '{text: .}' slack.txt | curl --fail-with-body -X POST -H 'Content-type: application/json' -d @- "$SLACK_WEBHOOK_URL"
          else
            echo "No drift or no webhook; skipping Slack."
          fi

  nightly-test-daily-finish:
    needs: [
      nightly-test-accuracy-text-models-1-tpu-daily,
      nightly-test-perf-text-models-1-tpu-daily,
      nightly-test-openai-api-surface-1-tpu-daily,
      multi-host-test-mimo-flash-daily,
      nightly-infra-smoke-1-tpu-daily,
      nightly-test-accuracy-text-models-4-tpu-daily,
      nightly-test-perf-text-models-4-tpu-daily,
      nightly-recurrent-e2e-4-tpu-daily,
      nightly-recurrent-ab-perf-4-tpu-daily,
      nightly-recurrent-cache-aware-4-tpu-daily,
      nightly-recurrent-accuracy-4-tpu-daily,
      nightly-trend-monitor,
      nightly-trend-alert,
    ]
    if: always() && github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Check all daily job statuses
        run: |
          echo "=== Daily Test Results ==="
          echo "accuracy-1-tpu-daily: ${{ needs.nightly-test-accuracy-text-models-1-tpu-daily.result }}"
          echo "perf-text-1-tpu-daily: ${{ needs.nightly-test-perf-text-models-1-tpu-daily.result }}"
          echo "openai-api-surface-1-tpu-daily: ${{ needs.nightly-test-openai-api-surface-1-tpu-daily.result }}"
          echo "multi-host-mimo-flash-daily: ${{ needs.multi-host-test-mimo-flash-daily.result }}"
          echo "infra-smoke-1-tpu-daily: ${{ needs.nightly-infra-smoke-1-tpu-daily.result }}"
          echo "accuracy-4-tpu-daily: ${{ needs.nightly-test-accuracy-text-models-4-tpu-daily.result }}"
          echo "perf-4-tpu-daily: ${{ needs.nightly-test-perf-text-models-4-tpu-daily.result }}"
          echo "recurrent-e2e-4-tpu-daily: ${{ needs.nightly-recurrent-e2e-4-tpu-daily.result }}"
          echo "recurrent-ab-perf-4-tpu-daily: ${{ needs.nightly-recurrent-ab-perf-4-tpu-daily.result }}"
          echo "recurrent-cache-aware-4-tpu-daily: ${{ needs.nightly-recurrent-cache-aware-4-tpu-daily.result }}"
          echo "recurrent-accuracy-4-tpu-daily: ${{ needs.nightly-recurrent-accuracy-4-tpu-daily.result }}"
          # Visibility only, NOT gated: by design (continue-on-error) monitoring
          # never changes the nightly conclusion; a 'failure' just flags it broke.
          echo "trend-monitor (not gated): ${{ needs.nightly-trend-monitor.result }}"
          echo "trend-alert (not gated): ${{ needs.nightly-trend-alert.result }}"
          echo ""

          has_failure=false
          for job_result in \
            "accuracy-1-tpu-daily=${{ needs.nightly-test-accuracy-text-models-1-tpu-daily.result }}" \
            "perf-text-1-tpu-daily=${{ needs.nightly-test-perf-text-models-1-tpu-daily.result }}" \
            "openai-api-surface-1-tpu-daily=${{ needs.nightly-test-openai-api-surface-1-tpu-daily.result }}" \
            "multi-host-mimo-flash-daily=${{ needs.multi-host-test-mimo-flash-daily.result }}" \
            "infra-smoke-1-tpu-daily=${{ needs.nightly-infra-smoke-1-tpu-daily.result }}" \
            "accuracy-4-tpu-daily=${{ needs.nightly-test-accuracy-text-models-4-tpu-daily.result }}" \
            "perf-4-tpu-daily=${{ needs.nightly-test-perf-text-models-4-tpu-daily.result }}" \
            "recurrent-e2e-4-tpu-daily=${{ needs.nightly-recurrent-e2e-4-tpu-daily.result }}" \
            "recurrent-ab-perf-4-tpu-daily=${{ needs.nightly-recurrent-ab-perf-4-tpu-daily.result }}" \
            "recurrent-cache-aware-4-tpu-daily=${{ needs.nightly-recurrent-cache-aware-4-tpu-daily.result }}" \
            "recurrent-accuracy-4-tpu-daily=${{ needs.nightly-recurrent-accuracy-4-tpu-daily.result }}"; do
            job_name="${job_result%%=*}"
            result="${job_result#*=}"
            if [ "$job_name" = "multi-host-mimo-flash-daily" ] && [ "$result" = "skipped" ]; then
              echo "${job_name} temporarily skipped: multi-host CI capacity unavailable"
              continue
            fi
            if [ "$result" != "success" ]; then
              echo "::error::${job_name} did not succeed: ${result}"
              has_failure=true
            fi
          done

          if [ "$has_failure" = "true" ]; then
            echo "::error::One or more daily test jobs failed"
            exit 1
          fi

          echo "All daily test jobs passed"
