name: Nightly Test Daily

# Inputs (ref/job_filter/cases/pr_number) drive a single-case run on a PR. run-name
# tags manual workflow_dispatch runs by PR + case; under /run-nightly this is invoked
# as a reusable workflow, where the run is named by the caller (Slash Command Handler).
run-name: >-
  ${{ inputs.pr_number != '' && format('Nightly Test Daily — PR #{0} {1}', inputs.pr_number, inputs.cases || inputs.job_filter) || 'Nightly Test Daily' }}

# NOTE: The daily nightly suites are currently empty shells. Coverage will be
# redefined as part of the nightly vs daily split decision. The workflow is
# kept so any new daily case can be added by populating run_suite.py without
# restructuring CI.

on:
  schedule:
    - cron: '0 18 * * *'
  push:
    branches:
      - main
    paths:
      - "python/sgl_jax/version.py"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (PR HEAD for /run-nightly). Empty = this workflow's ref."
        required: false
        type: string
      job_filter:
        description: "Run only this job (its name). Empty or 'all' runs every daily job."
        required: false
        type: string
        default: "all"
      cases:
        description: "Comma-separated case name(s) for single_host/suite_runner.py --cases. Empty = whole suite."
        required: false
        type: string
      pr_number:
        description: "PR number to comment results on (for /run-nightly). Empty = no comment."
        required: false
        type: string
  # Reusable entry for /run-nightly: invoked via `uses:` from slash-command.yml, so a
  # PR-triggered nightly is part of the Slash Command Handler run — no standalone
  # "Nightly Test Daily" run, so the notifier / auto-bisect that watch it don't fire.
  workflow_call:
    inputs:
      ref:
        description: "Git ref to test (PR HEAD for /run-nightly). Empty = this workflow's ref."
        required: false
        type: string
      job_filter:
        description: "Run only this job (its name). Empty or 'all' runs every daily job."
        required: false
        type: string
        default: "all"
      cases:
        description: "Comma-separated case name(s) for single_host/suite_runner.py --cases. Empty = whole suite."
        required: false
        type: string
      pr_number:
        description: "PR number to comment results on (for /run-nightly). Empty = no comment."
        required: false
        type: string

concurrency:
  # Key by tested ref + job + case: a /run-nightly never cancels the scheduled main
  # run, and two cases mapping to the same job don't cancel each other (only a repeat
  # of the same case collapses).
  group: nightly-test-daily-${{ inputs.ref || github.ref }}-${{ inputs.job_filter || 'all' }}-${{ inputs.cases || 'all' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  nightly-test-accuracy-text-models-1-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-test-accuracy-text-models-1-tpu-daily')
    runs-on: arc-runner-v6e-1
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      JAX_PERSISTENT_CACHE_MIN_COMPILE_TIME_SECS: "1"
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run accuracy daily suite
        timeout-minutes: 10
        run: |
          cd test/srt
          python3 run_suite.py --suite nightly-test-accuracy-text-models-tpu-v6e-1-daily

  nightly-test-perf-text-models-1-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-test-perf-text-models-1-tpu-daily')
    runs-on: arc-runner-v6e-1
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      JAX_PERSISTENT_CACHE_MIN_COMPILE_TIME_SECS: "1"
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run perf daily suite
        timeout-minutes: 10
        run: |
          cd test/srt
          python3 run_suite.py --suite nightly-test-perf-text-models-tpu-v6e-1-daily

  nightly-test-openai-api-surface-1-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-test-openai-api-surface-1-tpu-daily')
    runs-on: arc-runner-v6e-1
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      JAX_PERSISTENT_CACHE_MIN_COMPILE_TIME_SECS: "1"
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run OpenAI API surface tests
        timeout-minutes: 15
        run: |
          cd test/srt
          python3 run_suite.py --suite nightly-test-openai-api-surface-tpu-v6e-1-daily

  multi-host-test-mimo-flash-daily:
    # Temporarily skipped until CI has 4-node v6e capacity for this multi-host suite.
    if: false
    uses: ./.github/workflows/multi-host-test.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  # Recurrent multi-host cache_aware has no nightly job (no 4x4 CI capacity); the
  # gate is covered single-host by nightly-recurrent-cache-aware-4-tpu-daily
  # (tp4/dp2/ep4), and the 16-chip run is a manual, on-demand procedure.

  nightly-infra-smoke-1-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-infra-smoke-1-tpu-daily')
    runs-on: arc-runner-v6e-1
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      JAX_PERSISTENT_CACHE_MIN_COMPILE_TIME_SECS: "1"
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run infra smoke tests
        timeout-minutes: 30
        run: |
          cd test/srt
          python3 run_suite.py --suite nightly-infra-smoke-tpu-v6e-1

  nightly-test-accuracy-text-models-4-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-test-accuracy-text-models-4-tpu-daily')
    runs-on: arc-runner-v6e-4
    # Read-only + persist-credentials:false — this job runs PR-HEAD code, so it must not
    # hold a write token; PASS/FAIL is posted from the separate comment job below.
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
      RESULTS_DIR: ${{ github.workspace }}/test/nightly_test_output/accuracy
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run 4-TPU accuracy daily suite
        id: run
        timeout-minutes: 150
        env:
          # /run-nightly passes a single case name here; empty runs the whole suite.
          CASES: ${{ inputs.cases }}
        run: |
          cd test/srt
          python3 nightly/single_host/suite_runner.py --suite accuracy-text-models-v6e-4 ${CASES:+--cases "$CASES"}
      - name: Publish accuracy JSON to observability dashboard mount (main only)
        # !cancelled() so a below-gate run (non-zero exit) still publishes its real data for the trend monitor.
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && github.repository == 'sgl-project/sglang-jax' && inputs.pr_number == '' }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          DEST="/observability-storage/${DATE}/single-host-accuracy-${{ github.run_id }}"
          mkdir -p "$DEST"
          shopt -s nullglob
          files=( ${{ github.workspace }}/test/nightly_test_output/accuracy/*.json )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No accuracy JSON to publish"
          else
            # A real cp failure must fail the step under set -e, not be hidden as
            # "nothing to publish" (which feeds the monitor a truncated night).
            cp "${files[@]}" "$DEST"/
            echo "Published ${#files[@]} accuracy JSON file(s) to $DEST"
          fi

  nightly-test-accuracy-4-tpu-comment:
    # Posts PASS/FAIL from a clean job (no PR-HEAD code ran here) so the write token
    # never shares an environment the PR could have tampered with. Skips cancelled
    # (superseded) / skipped runs.
    needs: nightly-test-accuracy-text-models-4-tpu-daily
    if: >-
      always() && inputs.pr_number != ''
      && contains(fromJSON('["success", "failure"]'), needs.nightly-test-accuracy-text-models-4-tpu-daily.result)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment result on PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CASE_KEY: ${{ inputs.cases || 'accuracy-text-models-v6e-4' }}
          RESULT: ${{ needs.nightly-test-accuracy-text-models-4-tpu-daily.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then status="PASS"; else status="FAIL"; fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "> **Nightly** [\`$CASE_KEY\`]($RUN_URL): **$status** — see the run's step summary for the score."

  nightly-test-perf-text-models-4-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-test-perf-text-models-4-tpu-daily')
    runs-on: arc-runner-v6e-4
    # Read-only + persist-credentials:false — runs PR-HEAD code, no write token here;
    # PASS/FAIL is posted from the separate comment job below.
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
      SGLANG_JAX_PROFILER_DIR: ${{ github.workspace }}/test/nightly_test_output/perf/traces
      RESULTS_DIR: ${{ github.workspace }}/test/nightly_test_output/perf
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run 4-TPU perf daily suite
        id: run
        timeout-minutes: 480
        env:
          # ci-data reads for the trailing-baseline gate (anonymous API gets
          # rate-limited, disabling that gate). Scheduled runs only — never hand the
          # PAT to PR-HEAD code, which a /run-nightly dispatch executes here.
          GITHUB_TOKEN: ${{ inputs.pr_number == '' && secrets.GH_PAT_FOR_NIGHTLY_CI_DATA || '' }}
          # /run-nightly passes a single case name here; empty runs the whole suite.
          CASES: ${{ inputs.cases }}
        run: |
          cd test/srt
          python3 nightly/single_host/suite_runner.py --suite perf-text-models-v6e-4 ${CASES:+--cases "$CASES"}
      - name: Publish perf CSV to ci-data (main only)
        if: github.ref == 'refs/heads/main' && github.repository == 'sgl-project/sglang-jax' && inputs.pr_number == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Stage as perf/<date>/<file>.csv — publish.py preserves the path under
          # --source-dir, landing at ci-data perf/<date>/ (caller owns the layout).
          DATE=$(date +'%Y-%m-%d')
          STAGE=./perf_csv_stage/perf/$DATE
          mkdir -p "$STAGE"
          if cp ${{ github.workspace }}/test/nightly_test_output/perf/*.csv "$STAGE"/ 2>/dev/null; then
            python3 scripts/ci/publish.py --data-type perf --source-dir ./perf_csv_stage
          else
            echo "::warning::No perf CSV to publish — suite produced no per-model CSV"
          fi
      - name: Publish perf traces to ci-data (main only)
        if: github.ref == 'refs/heads/main' && github.repository == 'sgl-project/sglang-jax' && inputs.pr_number == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Namespace traces by date/run so runs don't pile up at the ci-data root.
          DATE=$(date +'%Y-%m-%d')
          STAGE=./perf_trace_stage/traces/$DATE/single-host-perf-${{ github.run_id }}
          mkdir -p "$STAGE"
          if cp -r ${{ github.workspace }}/test/nightly_test_output/perf/traces/. "$STAGE"/ 2>/dev/null; then
            python3 scripts/ci/publish.py --data-type trace --source-dir ./perf_trace_stage
          else
            echo "::warning::No perf traces to publish"
          fi
      - name: Publish perf JSON to observability dashboard mount (main only)
        # !cancelled() so a below-gate run (non-zero exit) still publishes its real data for the trend monitor.
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && github.repository == 'sgl-project/sglang-jax' && inputs.pr_number == '' }}
        run: |
          # observability bucket is gcsfuse-mounted (like /models), so this is a
          # plain copy; layout matches multi-host, single-host- prefix marks source.
          DATE=$(date +'%Y-%m-%d')
          DEST="/observability-storage/${DATE}/single-host-perf-${{ github.run_id }}"
          mkdir -p "$DEST"
          shopt -s nullglob
          files=( ${{ github.workspace }}/test/nightly_test_output/perf/*.json )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No perf JSON to publish"
          else
            # A real cp failure must fail the step under set -e, not be hidden as
            # "nothing to publish" (which feeds the monitor a truncated night).
            cp "${files[@]}" "$DEST"/
            echo "Published ${#files[@]} perf JSON file(s) to $DEST"
          fi
      - name: Upload perf results (per-model CSV + xprof traces)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: perf-results-v6e-4-${{ github.run_id }}
          path: ${{ github.workspace }}/test/nightly_test_output/perf
          if-no-files-found: warn
          retention-days: 30

  nightly-test-perf-4-tpu-comment:
    # Same trust-boundary split as the accuracy comment job: PASS/FAIL posted from a
    # clean job that never ran PR-HEAD code. Skips cancelled (superseded) / skipped.
    needs: nightly-test-perf-text-models-4-tpu-daily
    if: >-
      always() && inputs.pr_number != ''
      && contains(fromJSON('["success", "failure"]'), needs.nightly-test-perf-text-models-4-tpu-daily.result)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment result on PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CASE_KEY: ${{ inputs.cases || 'perf-text-models-v6e-4' }}
          RESULT: ${{ needs.nightly-test-perf-text-models-4-tpu-daily.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then status="PASS"; else status="FAIL"; fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "> **Nightly (perf)** [\`$CASE_KEY\`]($RUN_URL): **$status** — see the run's step summary."

  nightly-recurrent-e2e-4-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-recurrent-e2e-4-tpu-daily')
    runs-on: arc-runner-v6e-4
    # Runs PR-HEAD code under /run-nightly → read-only, no write token.
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run recurrent determinism e2e (v6e-4)
        # Run from repo root (unlike the sibling daily jobs' `cd test/srt`) so the
        # suite's test/srt-prefixed path also resolves under rerun-test.yml (/rerun-group).
        # ~8-min test + 2x Qwen3.5-35B-A3B load & compile; load dominates and is bimodal
        # (warm ~29s vs cold gcsfuse ~14-40min each) → ~88min worst, so 120 for margin.
        timeout-minutes: 120
        run: |
          python3 test/srt/run_suite.py --suite nightly-recurrent-e2e-tpu-v6e-4

  nightly-recurrent-ab-perf-4-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-recurrent-ab-perf-4-tpu-daily')
    runs-on: arc-runner-v6e-4
    # Runs PR-HEAD code under /run-nightly → read-only, no write token.
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
      RESULTS_DIR: ${{ github.workspace }}/test/nightly_test_output/recurrent_ab
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run recurrent A/B perf gate (v6e-4)
        # Profile-backed A/B: the runner starts no-cache + unified-recurrent servers
        # sequentially, then an offline case applies the gsp/random --strict gate. Measured ~23min
        # wall-clock on a v6e-4 (compute: 2x 35B load + gsp/random x3 reps); the
        # cold-gcsfuse bimodal 35B load (warm ~29s vs cold ~14-40min each, x2) sets
        # the ceiling, so 120min covers two worst-case cold loads + the bench.
        timeout-minutes: 120
        env:
          # /run-nightly passes a single case name here; empty runs the whole suite.
          CASES: ${{ inputs.cases }}
        run: |
          cd test/srt
          python3 nightly/single_host/suite_runner.py --suite recurrent-ab-perf-v6e-4 ${CASES:+--cases "$CASES"}
      - name: Upload recurrent A/B results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: recurrent-ab-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}
          if-no-files-found: warn
          retention-days: 30

  nightly-recurrent-cache-aware-4-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-recurrent-cache-aware-4-tpu-daily')
    runs-on: arc-runner-v6e-4
    # Runs PR-HEAD code under /run-nightly → read-only, no write token.
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
      RESULTS_DIR: ${{ github.workspace }}/test/nightly_test_output/recurrent_cache_aware
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run recurrent cache_aware reuse gate (v6e-4, tp4/dp2/ep4)
        # Single-host dp>1 cache_aware reuse-knee gate + min_running contrast
        # (re-homed off multi-host, which CI has no capacity for). Two
        # sequential 35B launches (cold gcsfuse ~14-40min each) -> keep margin.
        timeout-minutes: 180
        env:
          # /run-nightly passes a single case name here; empty runs the whole suite.
          CASES: ${{ inputs.cases }}
        run: |
          cd test/srt
          python3 nightly/single_host/suite_runner.py --suite recurrent-cache-aware-v6e-4 ${CASES:+--cases "$CASES"}
      - name: Upload recurrent cache-aware results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: recurrent-cache-aware-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}
          if-no-files-found: warn
          retention-days: 30

  nightly-recurrent-accuracy-4-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax' && (inputs.job_filter == '' || inputs.job_filter == 'all' || inputs.job_filter == 'nightly-recurrent-accuracy-4-tpu-daily')
    runs-on: arc-runner-v6e-4
    # Runs PR-HEAD code under /run-nightly → read-only, no write token.
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
      RESULTS_DIR: ${{ github.workspace }}/test/nightly_test_output/recurrent_accuracy
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run recurrent accuracy gate (v6e-4, tp4/dp2, cache on)
        # AccuracyCase framework: gsm8k gate (dp2/8192) + mmlu-thinking REPORT
        # (dp2/ep4/32768) = TWO sequential 35B servers. Each cold gcsfuse load is
        # bimodal (~29s warm vs ~14-40min cold), so 2 loads + the evals (~10min)
        # -> 150min covers two worst-case cold loads.
        timeout-minutes: 150
        env:
          # /run-nightly passes a single case name here; empty runs the whole suite.
          CASES: ${{ inputs.cases }}
        run: |
          cd test/srt
          python3 nightly/single_host/suite_runner.py --suite recurrent-accuracy-v6e-4 ${CASES:+--cases "$CASES"}
      - name: Upload recurrent accuracy results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: recurrent-accuracy-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}
          if-no-files-found: warn
          retention-days: 30

  nightly-recurrent-ab-perf-4-tpu-comment:
    needs: nightly-recurrent-ab-perf-4-tpu-daily
    if: >-
      always() && inputs.pr_number != ''
      && contains(fromJSON('["success", "failure"]'), needs.nightly-recurrent-ab-perf-4-tpu-daily.result)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment result on PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CASE_KEY: ${{ inputs.cases || 'recurrent-ab' }}
          RESULT: ${{ needs.nightly-recurrent-ab-perf-4-tpu-daily.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then status="PASS"; else status="FAIL"; fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "> **Nightly (recurrent A/B)** [\`$CASE_KEY\`]($RUN_URL): **$status**."

  nightly-recurrent-cache-aware-4-tpu-comment:
    needs: nightly-recurrent-cache-aware-4-tpu-daily
    if: >-
      always() && inputs.pr_number != ''
      && contains(fromJSON('["success", "failure"]'), needs.nightly-recurrent-cache-aware-4-tpu-daily.result)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment result on PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CASE_KEY: ${{ inputs.cases || 'recurrent-cache-aware-v6e-4' }}
          RESULT: ${{ needs.nightly-recurrent-cache-aware-4-tpu-daily.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then status="PASS"; else status="FAIL"; fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "> **Nightly (recurrent cache-aware)** [\`$CASE_KEY\`]($RUN_URL): **$status**."

  nightly-recurrent-accuracy-4-tpu-comment:
