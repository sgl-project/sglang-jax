name: Nightly Test Daily

# NOTE: As of #1218 the daily nightly suites are empty shells. Coverage will
# be redefined under #1117 (nightly vs daily split decision). The workflow is
# kept so any new daily case can be added by populating run_suite.py without
# restructuring CI.

on:
  schedule:
    - cron: '0 18 * * *'
  push:
    branches:
      - main
    paths:
      - "python/sgl_jax/version.py"
  workflow_dispatch:
concurrency:
  group: nightly-test-daily-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  nightly-test-accuracy-text-models-1-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: arc-runner-v6e-1
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run accuracy daily suite (currently empty — see #1117)
        timeout-minutes: 10
        run: |
          cd test/srt
          python3 run_suite.py --suite nightly-test-accuracy-text-models-tpu-v6e-1-daily

  nightly-test-perf-text-models-1-tpu-daily:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: arc-runner-v6e-1
    env:
      TZ: Asia/Shanghai
      JAX_COMPILATION_CACHE_DIR: /xla-cache
      SGLANG_JAX_MODEL_CACHE: /models/model_scope
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
      - name: Run perf daily suite (currently empty — see #1117)
        timeout-minutes: 10
        run: |
          cd test/srt
          python3 run_suite.py --suite nightly-test-perf-text-models-tpu-v6e-1-daily

  multi-host-test-mimo-flash-daily:
    if: github.repository == 'sgl-project/sglang-jax'
    uses: ./.github/workflows/multi-host-test.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  unit-test-cpu-daily:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: arc-runner-cpu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: ./.github/actions/setup-venv
        with:
          install-target: python[cpu]
      - name: Run unit test CPU suite
        timeout-minutes: 30
        env:
          SGLANG_JAX_IS_IN_CI: true
          USE_DEVICE_TYPE: cpu
        run: |
          python3 test/srt/run_suite.py --suite unit-test-cpu

  nightly-test-daily-finish:
    needs: [
      nightly-test-accuracy-text-models-1-tpu-daily,
      nightly-test-perf-text-models-1-tpu-daily,
      multi-host-test-mimo-flash-daily,
      unit-test-cpu-daily,
    ]
    if: always() && github.repository == 'sgl-project/sglang-jax'
    runs-on: ubuntu-latest
    steps:
      - name: Check all daily job statuses
        run: |
          echo "=== Daily Test Results ==="
          echo "accuracy-1-tpu-daily: ${{ needs.nightly-test-accuracy-text-models-1-tpu-daily.result }}"
          echo "perf-text-1-tpu-daily: ${{ needs.nightly-test-perf-text-models-1-tpu-daily.result }}"
          echo "multi-host-mimo-flash-daily: ${{ needs.multi-host-test-mimo-flash-daily.result }}"
          echo "unit-test-cpu-daily: ${{ needs.unit-test-cpu-daily.result }}"
          echo ""

          has_failure=false
          for job_result in \
            "accuracy-1-tpu-daily=${{ needs.nightly-test-accuracy-text-models-1-tpu-daily.result }}" \
            "perf-text-1-tpu-daily=${{ needs.nightly-test-perf-text-models-1-tpu-daily.result }}" \
            "multi-host-mimo-flash-daily=${{ needs.multi-host-test-mimo-flash-daily.result }}" \
            "unit-test-cpu-daily=${{ needs.unit-test-cpu-daily.result }}"; do
            job_name="${job_result%%=*}"
            result="${job_result#*=}"
            if [ "$result" != "success" ]; then
              echo "::error::${job_name} did not succeed: ${result}"
              has_failure=true
            fi
          done

          if [ "$has_failure" = "true" ]; then
            echo "::error::One or more daily test jobs failed"
            exit 1
          fi

          echo "All daily test jobs passed"
