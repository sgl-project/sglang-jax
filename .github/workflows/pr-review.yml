name: PR Review (Claude)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      || (github.event_name == 'issue_comment'
          && github.event.issue.pull_request != null
          && startsWith(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve PR ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER=${{ github.event.issue.number }}
            HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
            HEAD_REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName -q .headRefName)
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
            HEAD_REF=${{ github.event.pull_request.head.ref }}
          fi
          echo "number=$PR_NUMBER"  >> "$GITHUB_OUTPUT"
          echo "sha=$HEAD_SHA"      >> "$GITHUB_OUTPUT"
          echo "ref=$HEAD_REF"      >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          track_progress: true
          prompt_file: .github/claude/pr-review-prompt.md
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(git log:*),Bash(git show:*),Bash(git diff:*),mcp__github_inline_comment__create_inline_comment"
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          API_TIMEOUT_MS: "3000000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          ANTHROPIC_MODEL: claude-opus-4-6
          ANTHROPIC_SMALL_FAST_MODEL: claude-opus-4-6
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-6
          ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-opus-4-6
          CLAUDE_CODE_LOG_LEVEL: debug
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.sha }}
          PR_HEAD_REF: ${{ steps.pr.outputs.ref }}
