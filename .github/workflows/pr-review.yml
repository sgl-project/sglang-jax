name: PR Review (Claude)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: >-
    pr-review-${{ github.event.issue.number }}-${{
      (
        startsWith(github.event.comment.body, '/review')
        && contains(fromJSON('["OWNER","COLLABORATOR"]'), github.event.comment.author_association)
      )
      && 'active'
      || github.run_id
    }}
  cancel-in-progress: true

jobs:
  review:
    if: >
      github.event.issue.pull_request != null
      && startsWith(github.event.comment.body, '/review')
      && contains(fromJSON('["OWNER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve PR ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
          HEAD_REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName -q .headRefName)
          echo "number=$PR_NUMBER"  >> "$GITHUB_OUTPUT"
          echo "sha=$HEAD_SHA"      >> "$GITHUB_OUTPUT"
          echo "ref=$HEAD_REF"      >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true
          prompt: |
            # sgl-jax PR Review

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}
            HEAD SHA: ${{ steps.pr.outputs.sha }}
            HEAD REF: ${{ steps.pr.outputs.ref }}

            The PR branch is already checked out in the current working directory.
            You can also use `gh pr diff <PR_NUMBER>`, `gh pr view <PR_NUMBER>`, and
            `git show <SHA>` to inspect the change. You are free to `Read` / `Grep` /
            `Glob` any file in the repo to verify assumptions before commenting.

            ## Your job

            Review this pull request and post actionable feedback.

            ## How to comment

            - For each concrete issue tied to a specific code location, use
              `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`.
              Cite the file path and line number from the new (post-change) side of the diff.
            - After all inline comments, post **one** top-level summary via
              `gh pr comment` with:
              - **TL;DR** — one sentence verdict.
              - **Top issues** — bulleted recap of the most important inline findings
                (skip if none).
              - **Security concerns** — "None" or a short note.
              - **Test coverage** — does the PR include tests for the changed behavior?
            - Do NOT post review text as chat messages — everything goes to GitHub via
              the tools above.
            - Do NOT submit a formal GitHub "review" (approve/request changes).
              Only comments.

            ## What to flag

            **Be thorough on:** clear bugs, data corruption, race conditions, silent
            correctness regressions, security holes (auth, secret exposure, injection),
            public API breakage, and changes that contradict existing callers.

            **Be confident before flagging:** style preferences, micro-optimizations,
            naming, "could be cleaner" suggestions. If you cannot describe a concrete
            failure scenario, do not flag it.

            **Skip entirely:** formatting, import order, line length, typo-only
            fixes — pre-commit (black, ruff, isort, codespell, mypy) already handles
            those.

            ## Review principles (borrowed from PR-Agent)

            - Focus on lines starting with `+`. The `-` lines are context for
              understanding intent.
            - You only see the diff plus what you choose to `Read`. Avoid suggestions
              that duplicate functionality that may already exist elsewhere — `Grep`
              first if in doubt.
            - Quote symbols and paths with backticks.
            - If a hunk ends mid-scope (open `if`/`for`/`try`), don't claim the code
              is incomplete — just review what's visible.
            - When potential impact is high (data loss, security) but you're not
              fully sure, you may flag it, but **explicitly say what remains
              uncertain**. Otherwise stay silent.
            - One issue per inline comment. Make the failure scenario concrete:
              "if X happens, Y breaks because Z". No vague concerns.
            - Tone: matter-of-fact. No "Great job", no "Thanks for", no apologies.

            ## Output discipline

            - 0–6 inline comments. Quality over quantity. If there's nothing wrong,
              post the summary with "No issues found" and stop.
            - Summary comment must be under ~200 words.
            - Reply in the same natural language as the PR title/description
              (English by default).
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(git log:*),Bash(git show:*),Bash(git diff:*),mcp__github_inline_comment__create_inline_comment"
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          API_TIMEOUT_MS: "3000000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          ANTHROPIC_MODEL: claude-opus-4-7
          ANTHROPIC_SMALL_FAST_MODEL: claude-opus-4-7
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-7
          ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-opus-4-7
          CLAUDE_CODE_LOG_LEVEL: debug
