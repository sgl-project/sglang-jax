name: Release Docker

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag to publish from (e.g. v0.0.3rc0)"
        required: true
        type: string
      version:
        description: "Version string without v prefix (e.g. 0.0.3rc0)"
        required: true
        type: string
      update_latest:
        description: "Whether to also tag the image as :latest"
        required: true
        type: boolean
      dry_run:
        description: "If true, build but do not push"
        required: true
        type: boolean

env:
  IMAGE: lmsysorg/sglang-jax

jobs:
  publish:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.dry_run && github.ref || inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ ! inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TAGS="${IMAGE}:v${VERSION}"
          if [[ "${{ inputs.update_latest }}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ ! inputs.dry_run }}
          load: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ inputs.version }}

      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          docker run --rm "${IMAGE}:v${{ inputs.version }}" \
            python -c "import sgl_jax; print('sgl_jax version:', sgl_jax.__version__); assert sgl_jax.__version__ == '${{ inputs.version }}', sgl_jax.__version__"
