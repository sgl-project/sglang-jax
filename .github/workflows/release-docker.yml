name: Release Docker

on:
  workflow_call:
    inputs:
      version:
        description: "Version string without v prefix (e.g. 0.0.3, 0.0.3rc0)"
        required: true
        type: string
      update_latest:
        description: "Whether to also tag the image as :latest (false for rcN)"
        required: true
        type: boolean

env:
  IMAGE: lmsysorg/sglang-jax

jobs:
  publish:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TAGS="${IMAGE}:v${VERSION}"
          if [[ "${{ inputs.update_latest }}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ inputs.version }}
