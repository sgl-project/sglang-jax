name: Nightly Slack Notify

on:
  workflow_run:
    workflows:
      - "Nightly Test Daily"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID to check (for manual testing)"
        required: true

concurrency:
  group: nightly-slack-notify-${{ github.event.workflow_run.id || github.event.inputs.run_id || github.run_id }}
  cancel-in-progress: true

jobs:
  notify-failure:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Classify failures
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'Manual Check' }}
          RUN_URL: ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.event.inputs.run_id) }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || 'N/A' }}
          COMMIT_AUTHOR: ${{ github.event.workflow_run.head_commit.author.name || github.event.workflow_run.actor.login || 'unknown' }}
        run: >
          python3 scripts/ci/slack_notify.py
          --repo "$REPO"
          --run-id "$RUN_ID"
          --workflow-name "$WORKFLOW_NAME"
          --run-url "$RUN_URL"
          --commit-sha "$COMMIT_SHA"
          --commit-author "$COMMIT_AUTHOR"
          --slack-output slack_summary.txt

      - name: AI bug analysis
        id: ai_analysis
        if: steps.classify.outputs.has_bugs == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          prompt: |
            # Nightly CI Bug Analysis

            REPO: ${{ github.repository }}
            RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}

            You are analyzing failed nightly CI jobs that have been
            pre-classified as likely bugs (not timeouts, resource exhaustion,
            or infrastructure issues).

            The file `classification.json` in the working directory contains
            the failure classification for all jobs. Focus ONLY on jobs where
            `failure_type` is `"bug"`.

            ## Investigation steps

            1. Read `classification.json` to identify bug-type jobs.
            2. Fetch failure logs:
               `gh run view <RUN_ID> --log-failed`
               Focus on tracebacks, assertion errors, and test failures.
               If logs are large, grep for the actual failing assertion /
               traceback / non-zero exit rather than reading everything.
            3. Inspect the source code at HEAD to understand the failing
               code paths if needed.
            4. Summarize the root cause in 1-2 sentences per job.

            ## Required output

            Write `ai_analysis.json` in the working directory with this exact
            shape — one entry per bug-type job, key point only:

            {"jobs": [{"name": "<exact job name from classification.json>",
                       "root_cause": "<one short sentence: the single key reason>",
                       "fix": "<one short, actionable sentence>"}]}

            Rules:
            - Use the exact job names from classification.json; bug-type jobs only.
            - One sentence per field. No stack traces, code blocks, or file:line
              dumps — those live in the run logs.

            ## Discipline

            - Do not invent facts. If evidence is unavailable, say so.
            - Do not push code changes.
            - English output throughout.
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "Read,Grep,Glob,Bash(gh run view:*),Bash(gh api:*),Bash(cat:*),Bash(echo:*),Write"
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          API_TIMEOUT_MS: "3000000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          ANTHROPIC_MODEL: claude-opus-4-7
          ANTHROPIC_SMALL_FAST_MODEL: claude-opus-4-7
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-7
          ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-opus-4-7
          CLAUDE_CODE_LOG_LEVEL: debug

      - name: Create or update CI failure issues
        if: always() && steps.classify.conclusion == 'success' && hashFiles('classification.json') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'Manual Check' }}
          RUN_URL: ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.event.inputs.run_id) }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || 'N/A' }}
          COMMIT_AUTHOR: ${{ github.event.workflow_run.head_commit.author.name || github.event.workflow_run.actor.login || 'unknown' }}
          CI_FAILURE_FALLBACK_ASSIGNEES: ${{ vars.CI_FAILURE_FALLBACK_ASSIGNEES }}
        run: >
          python3 scripts/ci/ci_failure_issues.py
          --repo "$REPO"
          --run-id "$RUN_ID"
          --workflow-name "$WORKFLOW_NAME"
          --run-url "$RUN_URL"
          --commit-sha "$COMMIT_SHA"
          --commit-author "$COMMIT_AUTHOR"
          --classification classification.json
          --ai-analysis ai_analysis.json
          --output failure_issues.json

      - name: Find latest successful nightly
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh api "repos/$REPO/actions/workflows/nightly-test-daily.yml/runs" \
            --method GET \
            -f branch=main -f status=success -f per_page=1 \
            --jq '.workflow_runs[0] // empty | {run_id: (.id|tostring), run_url: .html_url, completed_at: .updated_at}' \
            > latest_successful_nightly.json; then
            echo '{}' > latest_successful_nightly.json
          fi
          if [ ! -s latest_successful_nightly.json ]; then
            echo '{}' > latest_successful_nightly.json
          fi

      - name: Build nightly status
        if: always()
        env:
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'Manual Check' }}
          RUN_URL: ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.event.inputs.run_id) }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || 'N/A' }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion || 'unknown' }}
        run: |
          set -euo pipefail
          args=(
            build
            --workflow-name "$WORKFLOW_NAME"
            --run-id "$RUN_ID"
            --run-url "$RUN_URL"
            --head-sha "$COMMIT_SHA"
            --head-branch "$HEAD_BRANCH"
            --conclusion "$CONCLUSION"
            --latest-successful-nightly latest_successful_nightly.json
            --output nightly-status.json
          )
          if [ -f classification.json ]; then
            args+=(--classification classification.json)
          fi
          if [ -f failure_issues.json ]; then
            args+=(--failure-issues failure_issues.json)
          fi
          python3 scripts/ci/release_gate.py "${args[@]}"

      - name: Publish nightly status
        if: >-
          always() &&
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.name == 'Nightly Test Daily' &&
          hashFiles('nightly-status.json') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_NIGHTLY_CI_DATA }}
          GITHUB_RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.event.workflow_run.run_number || github.run_number }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::GH_PAT_FOR_NIGHTLY_CI_DATA is required to publish release-gate status."
            exit 1
          fi
          python3 scripts/ci/publish.py --data-type status --source-dir .

      - name: Finalize summary with AI analysis and issue links
        if: always() && steps.classify.conclusion == 'success' && hashFiles('classification.json') != ''
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'Manual Check' }}
          RUN_URL: ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.event.inputs.run_id) }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || 'N/A' }}
          COMMIT_AUTHOR: ${{ github.event.workflow_run.head_commit.author.name || github.event.workflow_run.actor.login || 'unknown' }}
        run: |
          set -euo pipefail
          args=(
            --repo "$REPO"
            --run-id "$RUN_ID"
            --workflow-name "$WORKFLOW_NAME"
            --run-url "$RUN_URL"
            --commit-sha "$COMMIT_SHA"
            --commit-author "$COMMIT_AUTHOR"
            --from-classification classification.json
            --ai-analysis ai_analysis.json
            --slack-output slack_summary.txt
          )
          if [ -f failure_issues.json ]; then
            args+=(--failure-issues failure_issues.json)
          fi
          python3 scripts/ci/slack_notify.py "${args[@]}"

      - name: Post to Slack
        if: always() && steps.classify.conclusion == 'success'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping."
            exit 0
          fi
          SUMMARY=$(cat slack_summary.txt)
          if [ -z "$SUMMARY" ]; then
            echo "No failures detected, skipping Slack notification."
            exit 0
          fi
          jq -n --arg text "$SUMMARY" \
            '{"blocks":[{"type":"section","text":{"type":"mrkdwn","text":$text}}]}' | \
            curl --fail-with-body -X POST -H 'Content-type: application/json' \
              -d @- "$SLACK_WEBHOOK_URL"

      - name: Upload classification artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nightly-failure-classification-${{ github.run_number }}
          path: |
            classification.json
            failure_issues.json
            nightly-status.json
            ai_analysis.json
            latest_successful_nightly.json
          retention-days: 14
          if-no-files-found: ignore
