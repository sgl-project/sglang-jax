name: PR Test

on:
  push:
    branches:
      - main
      - "epic/*"
    paths:
      - "python/**"
      - "scripts/**"
      - "test/**"
      - ".github/workflows/pr-test.yml"
  pull_request:
    branches:
      - main
      - "epic/*"
    paths:
      - "python/**"
      - "scripts/**"
      - "test/**"
      - ".github/workflows/pr-test.yml"

concurrency:
  group: pr-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================== check changes ====================================================
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      unit_test_1: ${{ steps.triggers.outputs.unit_test_1 }}
      unit_test_4: ${{ steps.triggers.outputs.unit_test_4 }}
      e2e_test_1: ${{ steps.triggers.outputs.e2e_test_1 }}
      e2e_test_4: ${{ steps.triggers.outputs.e2e_test_4 }}
      accuracy_test: ${{ steps.triggers.outputs.accuracy_test }}
      performance_test: ${{ steps.triggers.outputs.performance_test }}
      pallas_kernel: ${{ steps.triggers.outputs.pallas_kernel }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      # TODO: use run-ci label when sglang-jax-bot exists
      # - name: Fail if the PR does not have the 'run-ci' label
      #   if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'run-ci')
      #   run: |
      #     echo "This pull request does not have the 'run-ci' label. Failing the workflow."
      #     exit 1

      - name: Fail if the PR is a draft
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
        run: |
          echo "This pull request is a draft. Failing the workflow."
          exit 1

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            foundational:
              - "python/sgl_jax/srt/utils/**"
              - "python/sgl_jax/srt/configs/**"
              - "python/sgl_jax/srt/server_args.py"
              - "python/sgl_jax/srt/__init__.py"
              - "python/sgl_jax/srt/conversation.py"
              - "python/sgl_jax/srt/hf_transformers_utils.py"
              - "python/sgl_jax/srt/jinja_template_utils.py"
              - "python/sgl_jax/srt/memory_profiler.py"
              - "python/sgl_jax/srt/precision_tracer.py"
              - "python/sgl_jax/srt/reasoning_parser.py"
              - "python/*.toml"
              - "python/sgl_jax/__init__.py"
              - "python/sgl_jax/global_config.py"
              - "python/sgl_jax/version.py"
              - "scripts/**"
              - "test/srt/run_suite.py"
              - ".github/workflows/pr-test.yml"
            kernels:
              - "python/sgl_jax/srt/kernels/**"
            layers:
              - "python/sgl_jax/srt/layers/**"
            mem_cache:
              - "python/sgl_jax/srt/mem_cache/**"
            sampling:
              - "python/sgl_jax/srt/sampling/**"
              - "python/sgl_jax/srt/eplb/**"
            model_executor:
              - "python/sgl_jax/srt/model_executor/**"
              - "python/sgl_jax/srt/model_loader/**"
            models:
              - "python/sgl_jax/srt/models/**"
            managers:
              - "python/sgl_jax/srt/managers/**"
            entrypoints:
              - "python/sgl_jax/srt/entrypoints/**"
            speculative:
              - "python/sgl_jax/srt/speculative/**"
            lora:
              - "python/sgl_jax/srt/lora/**"
            multimodal:
              - "python/sgl_jax/srt/multimodal/**"
            constrained:
              - "python/sgl_jax/srt/constrained/**"
              - "python/sgl_jax/srt/function_call/**"
            quantization:
              - "python/sgl_jax/srt/utils/quantization/**"
              - "python/sgl_jax/srt/kernels/quantized_matmul/**"
            test_e2e:
              - "test/srt/**"
            any_source:
              - "python/sgl_jax/srt/**"
            pallas_kernel:
              - "python/sgl_jax/srt/kernels/**"
              - "benchmark/kernels/**"

      - name: Compute composite triggers
        id: triggers
        run: |
          # Read filter outputs
          FOUNDATIONAL=${{ steps.filter.outputs.foundational }}
          KERNELS=${{ steps.filter.outputs.kernels }}
          LAYERS=${{ steps.filter.outputs.layers }}
          MEM_CACHE=${{ steps.filter.outputs.mem_cache }}
          SAMPLING=${{ steps.filter.outputs.sampling }}
          MODEL_EXECUTOR=${{ steps.filter.outputs.model_executor }}
          MODELS=${{ steps.filter.outputs.models }}
          MANAGERS=${{ steps.filter.outputs.managers }}
          ENTRYPOINTS=${{ steps.filter.outputs.entrypoints }}
          SPECULATIVE=${{ steps.filter.outputs.speculative }}
          LORA=${{ steps.filter.outputs.lora }}
          MULTIMODAL=${{ steps.filter.outputs.multimodal }}
          CONSTRAINED=${{ steps.filter.outputs.constrained }}
          QUANTIZATION=${{ steps.filter.outputs.quantization }}
          TEST_E2E=${{ steps.filter.outputs.test_e2e }}
          ANY_SOURCE=${{ steps.filter.outputs.any_source }}
          PALLAS_KERNEL=${{ steps.filter.outputs.pallas_kernel }}

          # CORE = any core pipeline module changed
          if [[ "$FOUNDATIONAL" == "true" || "$KERNELS" == "true" || "$LAYERS" == "true" \
             || "$MEM_CACHE" == "true" || "$SAMPLING" == "true" || "$MODEL_EXECUTOR" == "true" \
             || "$MODELS" == "true" || "$MANAGERS" == "true" || "$ENTRYPOINTS" == "true" ]]; then
            CORE=true
          else
            CORE=false
          fi

          # Safety net: source changed but no specific filter matched → force CORE
          if [[ "$ANY_SOURCE" == "true" && "$CORE" == "false" \
             && "$SPECULATIVE" == "false" && "$LORA" == "false" \
             && "$MULTIMODAL" == "false" && "$CONSTRAINED" == "false" \
             && "$QUANTIZATION" == "false" ]]; then
            echo "Safety net triggered: source changed but no specific filter matched, forcing CORE=true"
            CORE=true
          fi

          # Compute per-job triggers
          # unit-test-1-tpu: CORE or any leaf module or test changes
          if [[ "$CORE" == "true" || "$SPECULATIVE" == "true" || "$MULTIMODAL" == "true" \
             || "$LORA" == "true" || "$CONSTRAINED" == "true" || "$QUANTIZATION" == "true" \
             || "$TEST_E2E" == "true" ]]; then
            echo "unit_test_1=true" >> $GITHUB_OUTPUT
          else
            echo "unit_test_1=false" >> $GITHUB_OUTPUT
          fi

          # unit-test-4-tpu: only foundational/kernels/layers/mem_cache
          if [[ "$FOUNDATIONAL" == "true" || "$KERNELS" == "true" \
             || "$LAYERS" == "true" || "$MEM_CACHE" == "true" ]]; then
            echo "unit_test_4=true" >> $GITHUB_OUTPUT
          else
            echo "unit_test_4=false" >> $GITHUB_OUTPUT
          fi

          # e2e-test-1-tpu: CORE or lora or constrained or test changes
          if [[ "$CORE" == "true" || "$LORA" == "true" \
             || "$CONSTRAINED" == "true" || "$TEST_E2E" == "true" ]]; then
            echo "e2e_test_1=true" >> $GITHUB_OUTPUT
          else
            echo "e2e_test_1=false" >> $GITHUB_OUTPUT
          fi

          # e2e-test-4-tpu: CORE or quantization or multimodal or test changes
          if [[ "$CORE" == "true" || "$QUANTIZATION" == "true" \
             || "$MULTIMODAL" == "true" || "$TEST_E2E" == "true" ]]; then
            echo "e2e_test_4=true" >> $GITHUB_OUTPUT
          else
            echo "e2e_test_4=false" >> $GITHUB_OUTPUT
          fi

          # accuracy-test: CORE only
          echo "accuracy_test=$CORE" >> $GITHUB_OUTPUT

          # performance-test: CORE only
          echo "performance_test=$CORE" >> $GITHUB_OUTPUT

          # pallas-kernel-benchmark
          echo "pallas_kernel=$PALLAS_KERNEL" >> $GITHUB_OUTPUT

          echo "--- Trigger summary ---"
          echo "CORE=$CORE"
          echo "unit_test_1=$(grep unit_test_1 $GITHUB_OUTPUT | tail -1)"
          echo "unit_test_4=$(grep unit_test_4 $GITHUB_OUTPUT | tail -1)"
          echo "e2e_test_1=$(grep e2e_test_1 $GITHUB_OUTPUT | tail -1)"
          echo "e2e_test_4=$(grep e2e_test_4 $GITHUB_OUTPUT | tail -1)"
          echo "accuracy_test=$CORE"
          echo "performance_test=$CORE"
          echo "pallas_kernel=$PALLAS_KERNEL"
  # =============================================== unit-test ====================================================
  unit-test-1-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.unit_test_1 == 'true'
    runs-on: arc-runner-v6e-1
    #runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run unit test
        timeout-minutes: 30
        shell: bash
        env:
          SGLANG_JAX_IS_IN_CI: true
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          python test/srt/run_suite.py --suite unit-test-tpu-v6e-1 --auto-partition-id ${{ matrix.part }} --auto-partition-size 2

  unit-test-4-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.unit_test_4 == 'true'
    runs-on: arc-runner-v6e-4
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run unit test
        timeout-minutes: 30
        env:
          SGLANG_JAX_IS_IN_CI: true
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          bash scripts/killall_sglang.sh
          python test/srt/run_suite.py --suite unit-test-tpu-v6e-4 --auto-partition-id ${{ matrix.part }} --auto-partition-size 2

  # =============================================== e2e-test ===============================================
  e2e-test-1-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.e2e_test_1 == 'true'
    runs-on: arc-runner-v6e-1
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run e2e test
        timeout-minutes: 120
        shell: bash
        env:
          SGLANG_JAX_IS_IN_CI: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: 300
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          bash scripts/killall_sglang.sh
          python test/srt/run_suite.py --suite e2e-test-tpu-v6e-1 --auto-partition-id ${{ matrix.part }} --auto-partition-size 1


  e2e-test-4-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.e2e_test_4 == 'true'
    runs-on: arc-runner-v6e-4
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run e2e test
        timeout-minutes: 120
        shell: bash
        env:
          SGLANG_JAX_IS_IN_CI: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: 300
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          bash scripts/killall_sglang.sh
          python test/srt/run_suite.py --suite e2e-test-tpu-v6e-4 --auto-partition-id ${{ matrix.part }} --auto-partition-size 2

  # =============================================== accurancy-test ===============================================
  accurancy-test-1-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.accuracy_test == 'true'
    runs-on: arc-runner-v6e-1
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Evaluate accuracy
        timeout-minutes: 20
        env:
          SGLANG_JAX_IS_IN_CI: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: 300
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          bash scripts/killall_sglang.sh
          python test/srt/run_suite.py --suite accuracy-test-tpu-v6e-1 --auto-partition-id ${{ matrix.part }} --auto-partition-size 1

  accurancy-test-4-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.accuracy_test == 'true'

    runs-on: arc-runner-v6e-4
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Evaluate MoE accuracy (TP=4)
        timeout-minutes: 50
        env:
          SGLANG_JAX_IS_IN_CI: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: 300
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          bash scripts/killall_sglang.sh
          python test/srt/run_suite.py --suite accuracy-test-tpu-v6e-4 --timeout-per-file 3000 --auto-partition-id ${{ matrix.part }} --auto-partition-size 1

  # =============================================== performance-test ===============================================
  performance-test-1-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.performance_test == 'true'

    runs-on: arc-runner-v6e-1
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Benchmark performance
        timeout-minutes: 30
        env:
          SGLANG_JAX_IS_IN_CI: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: 300
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          bash scripts/killall_sglang.sh
          python test/srt/run_suite.py --suite performance-test-tpu-v6e-1 --auto-partition-id ${{ matrix.part }} --auto-partition-size 1

  performance-test-4-tpu:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.performance_test == 'true'

    runs-on: arc-runner-v6e-4
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Benchmark performance (tp=4)
        timeout-minutes: 50

        env:
          SGLANG_JAX_IS_IN_CI: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: 300
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          bash scripts/killall_sglang.sh
          python test/srt/run_suite.py --suite performance-test-tpu-v6e-4 --auto-partition-id ${{ matrix.part }} --auto-partition-size 2 --timeout-per-file 3000

  # =============================================== kernel-benchmark ===============================================
  pallas-kernel-benchmark:
    needs: [check-changes]
    if: github.event.pull_request.draft == false && needs.check-changes.outputs.pallas_kernel == 'true'
    runs-on: arc-runner-v6e-1
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run test
        timeout-minutes: 120
        shell: bash
        env:
          SGLANG_JAX_IS_IN_CI: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: 300
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install uv
          uv pip install -e "python[all]"
          python test/srt/run_suite.py --suite kernel-performance-test-tpu-v6e-1 --auto-partition-id ${{ matrix.part }} --auto-partition-size 2

  pr-test-finish:
    if: always()
    needs: [
      performance-test-1-tpu,
      performance-test-4-tpu,
      accurancy-test-1-tpu,
      accurancy-test-4-tpu,
      unit-test-1-tpu,
      unit-test-4-tpu,
      e2e-test-1-tpu,
      e2e-test-4-tpu,
      pallas-kernel-benchmark,
    ]
    runs-on: ubuntu-latest
    steps:
      - name: Check all dependent job statuses
        run: |
          results=(${{ join(needs.*.result, ' ') }})
          for result in "${results[@]}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done
          echo "All jobs completed successfully"
          exit 0
