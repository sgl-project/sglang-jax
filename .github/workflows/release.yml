name: Release

# Single user-facing entry point for the two-phase release flow.
# Phase 1 (tag job)     -> validates and pushes the annotated tag via tag.yml.
# Phase 2 (publish job) -> publishes wheel + image + GitHub Release via publish.yml.
#
# tag.yml and publish.yml remain individually dispatchable for advanced
# recovery flows (e.g. re-publishing from an existing tag without re-tagging).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target version string without v prefix (e.g. 0.0.3, 0.0.3rc0, 0.0.3.post1)"
        required: true
        type: string
      dry_run:
        description: "If true, build and validate but skip tag push and publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  tag:
    if: github.repository == 'sgl-project/sglang-jax'
    uses: ./.github/workflows/tag.yml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      dry_run: ${{ inputs.dry_run }}

  publish:
    needs: tag
    if: ${{ ! inputs.dry_run }}
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    with:
      tag: ${{ needs.tag.outputs.tag }}
      dry_run: false
