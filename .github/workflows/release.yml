name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string without v prefix (e.g. 0.0.3, 0.0.3rc0, 0.0.3.post1)"
        required: true
        type: string

permissions:
  contents: write

env:
  IMAGE: lmsysorg/sglang-jax

jobs:
  metadata:
    if: github.repository == 'sgl-project/sglang-jax'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      version: ${{ steps.compute.outputs.version }}
      is_prerelease: ${{ steps.compute.outputs.is_prerelease }}
      update_latest: ${{ steps.compute.outputs.update_latest }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging
        run: python -m pip install --upgrade packaging

      - name: Compute version metadata
        id: compute
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="$(python - <<'PY'
          import os, sys
          from packaging.version import InvalidVersion, Version

          v_str = os.environ["RAW_VERSION"].strip()
          try:
              print(str(Version(v_str)))
          except InvalidVersion as e:
              sys.stderr.write(f"::error::Invalid PEP 440 version {v_str!r}: {e}\n")
              sys.exit(1)
          PY
          )"
          TAG="v${VERSION}"
          IS_PRERELEASE="$(VERSION="${VERSION}" python - <<'PY'
          import os
          from packaging.version import Version

          v = Version(os.environ["VERSION"])
          print("true" if v.is_prerelease else "false")
          PY
          )"
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            UPDATE_LATEST=false
          else
            UPDATE_LATEST=true
          fi
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "is_prerelease=${IS_PRERELEASE}"
            echo "update_latest=${UPDATE_LATEST}"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: metadata
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify HEAD is on main history
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Current commit $GITHUB_SHA is not an ancestor of origin/main"
            exit 1
          fi

      - name: Verify tag does not already exist
        id: tag-check
        run: |
          set -euo pipefail
          TAG="${{ needs.metadata.outputs.tag }}"
          EXISTING_SHA="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk '{print $1}')"
          if [[ -z "${EXISTING_SHA}" ]]; then
            EXISTING_SHA="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}')"
          fi
          if [[ -n "${EXISTING_SHA}" ]]; then
            if [[ "${EXISTING_SHA}" != "${GITHUB_SHA}" ]]; then
              echo "::error::Tag ${TAG} exists on origin but points at ${EXISTING_SHA}, not ${GITHUB_SHA}"
              exit 1
            fi
            echo "Tag ${TAG} already exists on origin and points at ${GITHUB_SHA}; skipping tag creation."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging
        run: python -m pip install --upgrade packaging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wheel + Docker image
        run: make build VERSION=${{ needs.metadata.outputs.version }}

      - name: Smoke-test wheel + Docker image
        run: make test VERSION=${{ needs.metadata.outputs.version }}

      - name: Benchmark regression check (placeholder)
        run: |
          echo "TODO: implement benchmark regression check on TPU runners"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker image
        run: |
          set -euo pipefail
          VERSION="${{ needs.metadata.outputs.version }}"
          docker tag "${IMAGE}:${VERSION}" "${IMAGE}:v${VERSION}"
          docker push "${IMAGE}:v${VERSION}"
          if [[ "${{ needs.metadata.outputs.update_latest }}" == "true" ]]; then
            docker tag "${IMAGE}:${VERSION}" "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi

      - name: Publish wheel to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

      - name: Create and push annotated tag
        if: steps.tag-check.outputs.exists != 'true'
        run: |
          set -euo pipefail
          TAG="${{ needs.metadata.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "sglang-jax ${TAG}"
          git push origin "${TAG}"

  github-release:
    needs: [metadata, release]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: sglang-jax ${{ needs.metadata.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.metadata.outputs.is_prerelease == 'true' }}
          fail_on_unmatched_files: false
